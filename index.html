<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>wad-simulator-js — manage Mercenaries 2 patch WADs in your browser</title>
<style>
  :root {
    --bg:#0b1220; --panel:#111a2b; --panel2:#16213a; --line:#223049;
    --fg:#e2e8f0; --dim:#94a3b8; --faint:#64748b;
    --ok:#4ade80; --warn:#fbbf24; --bad:#f87171; --accent:#60a5fa;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font:13px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
  code, pre, .mono { font-family:ui-monospace, "Cascadia Code", Consolas, monospace; }
  header { padding:14px 20px; border-bottom:1px solid var(--line); background:var(--panel);
           display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; font-weight:600; }
  header .sub { color:var(--faint); font-size:12px; }
  header .badge { margin-left:auto; font-size:10px; letter-spacing:.06em; font-weight:600;
                  color:#86efac; border:1px solid #1e5236; background:#0f2a1c;
                  padding:2px 8px; border-radius:10px; }
  main { max-width:1200px; margin:0 auto; padding:20px; }
  .lead { color:var(--dim); margin-bottom:16px; max-width:70ch; }
  .note { color:var(--dim); font-size:12px; margin-top:16px; line-height:1.55; max-width:74ch;
          border-top:1px solid var(--line); padding-top:12px; }

  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:12px; margin-bottom:14px; }
  .card { display:flex; flex-direction:column; align-items:center; gap:8px; text-align:center;
          background:var(--panel); border:1px solid var(--line); border-radius:10px;
          padding:20px 16px; cursor:pointer; color:var(--fg); font:inherit; transition:.12s; }
  .card:hover { border-color:var(--accent); background:#18243b; transform:translateY(-2px); }
  .card-icon { font-size:26px; }
  .card-t { font-weight:600; }
  .card-s { color:var(--dim); font-size:12px; line-height:1.45; }
  .card.feature { border-color:#2f4a6d; background:var(--panel2); }
  .card.feature:hover { border-color:var(--accent); }

  /* rail (guided pack path) */
  .step { border:1px solid var(--line); border-radius:10px; margin-bottom:8px;
          background:var(--panel); overflow:hidden; }
  .step.open { border-color:#2f4a6d; background:var(--panel2); }
  .step.locked { opacity:.4; }
  .step-head { display:flex; align-items:center; gap:10px; width:100%; padding:12px 14px;
               background:none; border:0; color:var(--fg); font:inherit; text-align:left; }
  .step-head.clickable { cursor:pointer; }
  .step-head.clickable:hover { background:#18243b; }
  .step-n { flex:none; width:22px; height:22px; line-height:22px; text-align:center;
            border-radius:50%; background:var(--panel); color:var(--faint);
            border:1px solid var(--line); font-size:11px; }
  .step.open .step-n { background:var(--accent); color:#06121f; border-color:var(--accent); font-weight:700; }
  .step.done .step-n { background:#123324; color:var(--ok); border-color:#1e5236; }
  .step-t { font-weight:600; }
  .step.locked .step-t, .step.done .step-t { font-weight:400; color:var(--dim); }
  .step-sum { color:var(--ok); font-size:12px; margin-left:auto; font-family:ui-monospace,monospace; }
  .step-lock { margin-left:auto; font-size:10px; color:var(--faint); text-transform:uppercase; letter-spacing:.08em; }
  .step-body { padding:2px 16px 18px; }
  .step-body > p { color:var(--dim); margin:0 0 14px; max-width:70ch; }
  .step-actions { display:flex; gap:10px; align-items:center; margin-top:14px; flex-wrap:wrap; }
  .sample-row { margin-top:14px; padding-top:12px; border-top:1px solid var(--line); }
  .sample-row .note { border-top:0; padding-top:6px; margin-top:6px; }

  .drop { display:block; border:1.5px dashed var(--line); border-radius:8px; padding:16px;
          text-align:center; cursor:pointer; background:var(--panel); transition:.12s; }
  .drop.small { padding:14px; }
  .drop:hover, .drop.over { border-color:var(--accent); background:var(--panel2); }
  .drop input { display:none; }
  .drop b { display:block; margin-bottom:3px; }
  .drop .hint { display:block; color:var(--faint); font-size:12px; }

  .bar { display:flex; align-items:center; gap:12px; padding:12px 14px; background:var(--panel);
         border:1px solid var(--line); border-radius:10px; margin-bottom:12px; flex-wrap:wrap; }
  .bar-title { font-weight:600; font-family:ui-monospace,monospace; }
  .bar-sub { color:var(--faint); font-size:12px; }
  .actions { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
  @media (max-width:640px){ .actions { grid-template-columns:1fr; } }

  .btn { background:var(--accent); color:#06121f; border:0; border-radius:6px; padding:8px 14px;
         font:inherit; font-weight:600; cursor:pointer; }
  .btn.ghost { background:var(--panel2); color:var(--fg); border:1px solid var(--line); font-weight:400; }
  .btn.tiny { padding:4px 10px; font-size:12px; }
  .btn.danger { background:#3a1518; color:#fca5a5; border:1px solid #5a2020; font-weight:400; }
  .btn.danger:hover { background:#4a1a1e; }
  .btn:disabled { opacity:.45; cursor:not-allowed; }

  .table-wrap { overflow-x:auto; border:1px solid var(--line); border-radius:10px; }
  table.blocks { border-collapse:collapse; width:100%; font-size:12px; }
  table.blocks th { text-align:left; color:var(--faint); font-weight:600; text-transform:uppercase;
                    letter-spacing:.06em; font-size:10px; padding:9px 12px; border-bottom:1px solid var(--line);
                    background:var(--panel); position:sticky; top:0; }
  table.blocks td { padding:9px 12px; border-bottom:1px solid var(--line); vertical-align:top; }
  table.blocks tr:last-child td { border-bottom:0; }
  table.blocks tr:hover td { background:var(--panel2); }
  .dim { color:var(--faint); }
  .path { color:var(--dim); max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .empty { padding:28px; text-align:center; color:var(--faint); }

  .kind-chip { font-size:10px; padding:2px 8px; border-radius:10px; border:1px solid var(--line);
               color:var(--dim); text-transform:uppercase; letter-spacing:.05em; }
  .kind-chip.sges { color:var(--accent); border-color:#1e3a5f; }
  .kind-chip.ucfx { color:var(--ok); border-color:#1e5236; }
  .asset-chip { display:inline-flex; align-items:center; gap:6px; margin:0 6px 4px 0;
                background:var(--panel2); border:1px solid var(--line); border-radius:6px; padding:2px 8px; }
  .asset-h { font-family:ui-monospace,monospace; }
  .asset-t { font-size:10px; color:var(--faint); text-transform:uppercase; }
  .asset-sub { font-size:10px; color:var(--warn); }
  .kind-chip.note { color:var(--faint); border-style:dashed; }

  /* plain-language identity: type chip + override/new badge + reversed name */
  .asset-line { display:flex; align-items:center; gap:8px; margin-bottom:3px; flex-wrap:wrap; }
  .type-chip { font-size:10px; font-weight:600; padding:2px 8px; border-radius:10px;
               letter-spacing:.03em; border:1px solid var(--line); color:var(--fg); background:var(--panel2); }
  .type-chip.t27 { color:#7dd3fc; border-color:#1e3a5f; }  /* texture */
  .type-chip.t19 { color:#c4b5fd; border-color:#3b2f6d; }  /* model */
  .type-chip.t35 { color:#fca5a5; border-color:#5f1e1e; }  /* script */
  .type-chip.t23 { color:#fcd34d; border-color:#5f4a1e; }  /* ui movie */
  .verdict-badge { font-size:10px; padding:2px 7px; border-radius:10px; cursor:help; }
  .verdict-badge.override { color:#86efac; background:#0f2a1c; border:1px solid #1e5236; }
  .verdict-badge.new { color:#93c5fd; background:#0f1e34; border:1px solid #1e3a5f; }
  .asset-name { margin-bottom:3px; }
  .known-name { font-weight:600; color:var(--fg); }
  .blurb { display:block; color:var(--faint); font-size:11px; line-height:1.4; margin-top:1px; }

  /* mod grouping */
  .mod-head { display:flex; align-items:center; gap:10px; flex-wrap:wrap;
              margin:18px 0 6px; padding:8px 12px; border:1px solid var(--line);
              border-radius:8px 8px 0 0; border-bottom:0; background:var(--panel); }
  .mod-head.named { border-left:3px solid var(--accent); }
  .mod-badge { font-size:9px; font-weight:700; letter-spacing:.08em; color:#86efac;
               border:1px solid #1e5236; background:#0f2a1c; padding:1px 6px; border-radius:8px; }
  .mod-name { font-weight:600; }
  .mod-meta { color:var(--faint); font-size:12px; }
  .mod-head .btn.tiny { margin-left:auto; }
  .mod-desc { flex-basis:100%; color:var(--dim); font-size:12px; margin-top:2px; }

  /* how-it-works */
  details.how { margin-top:18px; border:1px solid var(--line); border-radius:8px; background:var(--panel); }
  details.how > summary { cursor:pointer; padding:11px 14px; font-weight:600; font-size:13px; color:var(--accent); }
  details.how[open] > summary { border-bottom:1px solid var(--line); }
  .how-flow { display:flex; align-items:stretch; gap:10px; padding:14px; flex-wrap:wrap; }
  .how-box { flex:1; min-width:180px; border:1px solid var(--line); border-radius:8px; padding:12px; background:var(--panel2); }
  .how-icon { font-size:22px; margin-bottom:4px; }
  .how-t { font-weight:600; margin-bottom:4px; }
  .how-s { color:var(--dim); font-size:12px; line-height:1.45; }
  .how-arrow { align-self:center; color:var(--faint); font-size:18px; }
  details.how .note { padding:0 14px 14px; margin-top:0; }
  .note.callout { margin:0 14px 14px; padding:10px 12px; border:1px solid #2f4a6d;
                  border-left:3px solid var(--accent); border-radius:6px; background:var(--panel2); color:var(--dim); }
  .note.callout b { color:var(--accent); }

  .verdict { border:1px solid var(--line); border-left-width:3px; border-radius:8px;
             padding:11px 13px; margin:0 0 14px; background:var(--panel); }
  .verdict.ok { border-left-color:var(--ok); }
  .verdict.bad { border-left-color:var(--bad); }
  .verdict-h { display:flex; align-items:center; gap:8px; font-weight:600; margin-bottom:7px; }
  .verdict.ok .verdict-i { color:var(--ok); } .verdict.bad .verdict-i { color:var(--bad); }
  .verdict-row { display:grid; grid-template-columns:130px 1fr; gap:10px; font-size:12px; padding:2px 0; color:var(--dim); }
  .verdict-row.bad .verdict-v { color:var(--bad); }
  .verdict-k { color:var(--faint); }
  .verdict-v { font-family:ui-monospace,monospace; word-break:break-all; }
  .verdict-hint { margin-top:8px; font-size:12px; color:var(--warn); line-height:1.5; }

  .modal-back { position:fixed; inset:0; background:rgba(4,8,15,.72); display:flex;
                align-items:center; justify-content:center; z-index:50; }
  .modal { background:var(--panel); border:1px solid var(--line); border-radius:12px;
           padding:18px; width:min(440px,92vw); }
  .modal-t { font-weight:600; margin-bottom:8px; }
  .field { display:block; margin:12px 0; }
  .field span { display:block; color:var(--dim); font-size:12px; margin-bottom:4px; }
  .field input, .field select { width:100%; background:var(--panel2); color:var(--fg);
           border:1px solid var(--line); border-radius:5px; padding:8px 10px; font:inherit; }
  .field select { appearance:none; -webkit-appearance:none; cursor:pointer; }
  .hashline { font-size:12px; margin:-4px 0 4px; }
  .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:14px; }
  a { color:var(--accent); }
</style>
</head>
<body>
<header>
  <h1>wad-simulator-js</h1>
  <span class="sub">manage Mercenaries&nbsp;2 patch WADs in your browser</span>
  <span class="badge" title="Verified against the Rust reader and the engine loader on real game data.">PORT VERIFIED</span>
</header>
<main>
  <div id="app"></div>
</main>
<script type="module">
  import { boot } from './src/ui/app.js';
  boot();
</script>
</body>
</html>
