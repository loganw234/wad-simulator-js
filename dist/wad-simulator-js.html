// Shared DOM helpers + a file/drop utility for the WAD and container inputs.

const $ = (s) => document.querySelector(s);

const el = (tag, cls, txt) => {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (txt !== undefined) e.textContent = txt;
  return e;
};

const fmtBytes = (n) => {
  if (n == null) return '—';
  if (n < 1024) return `${n} B`;
  if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
  return `${(n / 1024 / 1024).toFixed(2)} MB`;
};

/** Wire a drop zone + hidden file input to one handler(files: File[]). */
function wireDrop(zone, input, handler) {
  input.addEventListener('change', (e) => handler([...e.target.files]));
  zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('over'));
  zone.addEventListener('drop', (e) => {
    e.preventDefault();
    zone.classList.remove('over');
    handler([...e.dataTransfer.files]);
  });
}

export async function readFileBytes(file) {
  return new Uint8Array(await file.arrayBuffer());
}

function downloadBytes(name, bytes) {
  const a = el('a');
  a.href = URL.createObjectURL(new Blob([bytes], { type: 'application/octet-stream' }));
  a.download = name;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

/** A verdict card — same idea as the skinner's: answer "did it work?" on screen. */
function verdict({ ok, title, lines = [], hint }) {
  const box = el('div', `verdict ${ok ? 'ok' : 'bad'}`);
  const h = el('div', 'verdict-h');
  h.appendChild(el('span', 'verdict-i', ok ? '✓' : '✕'));
  h.appendChild(el('span', null, title));
  box.appendChild(h);
  for (const l of lines) {
    const row = el('div', `verdict-row${l.ok === false ? ' bad' : ''}`);
    row.appendChild(el('span', 'verdict-k', l.k));
    row.appendChild(el('span', 'verdict-v', l.v));
    box.appendChild(row);
  }
  if (hint) box.appendChild(el('div', 'verdict-hint', hint));
  return box;
}

  return buildPatchWadMulti(merged, csumValue, null, FFCS_CERT_BLOB);
}


// ===== src/sges.js =====
// sges block compression and decompression.
//
// Faithful port of mercs2_formats::sges. The Rust source states the fidelity contract this
// port inherits verbatim:
//
//   "the deflate bitstream is not byte-identical to Python's zlib — a different deflate
//    implementation packs the same data differently. Correctness is defined by round-trip
//    and engine load, NOT by byte-matching. The container framing (header, table, offsets,
//    flags, alignment) IS byte-faithful."
//
// So the CONTAINER FRAMING here is byte-for-byte the Rust output; the compressed payload is
// valid raw-DEFLATE (via fflate) that decompresses identically. That is the exact standard
// the Rust tool holds itself to — it is not byte-identical to the Python reference either.


const DEFAULT_SEGMENT_SIZE = 65536;
const DEFAULT_LEVEL = 6;

/**
 * Decompress an sges block back to raw bytes.
 *
 * The per-segment u16 compressed-size is unreliable for large/incompressible segments (it
 * can wrap or read 0), so for a COMPRESSED segment we hand the inflater the span from this
 * segment's offset up to the next (capped at 128 KB) and let it consume exactly the deflate
 * stream — the same tactic as the Rust and the original Python.
 */
function decompressSges(block) {
  if (block.length < 16) throw new Error('Block too small for sges header');
  if (String.fromCharCode(block[0], block[1], block[2], block[3]) !== 'sges') {
    throw new Error('Bad sges magic');
  }
  const segCount = u16(block, 6);
  const totalU = u32(block, 8);
  const tableStart = 16;
  if (block.length < tableStart + segCount * 8) throw new Error('Block too small for segment table');

  const segs = [];
  for (let i = 0; i < segCount; i++) {
    const base = tableStart + i * 8;
    const rawU = u16(block, base + 2);
    const flagged = u32(block, base + 4);
    segs.push({
      compSize: u16(block, base),
      uncompSize: rawU === 0 ? DEFAULT_SEGMENT_SIZE : rawU,
      offset: flagged & 0xfffffffe,
      isCompressed: (flagged & 1) !== 0,
    });
  }

  const end = block.length;
  const out = new Uint8Array(totalU);
  let written = 0;
  for (let i = 0; i < segs.length && written < totalU; i++) {
    const seg = segs[i];
    if (seg.offset >= end) break;
    if (seg.isCompressed) {
      const nextOff = i + 1 < segs.length ? segs[i + 1].offset : end;
      const readEnd = Math.min(nextOff, seg.offset + 131072, end);
      if (readEnd <= seg.offset) break;
      let dec;
      try {
        dec = inflateSync(block.subarray(seg.offset, readEnd), { out: new Uint8Array(seg.uncompSize) });
      } catch {
        break; // a corrupt stream stops the block, matching the reference (page count flags truncation)
      }
      out.set(dec.subarray(0, Math.min(dec.length, totalU - written)), written);
      written += Math.min(dec.length, totalU - written);
    } else {
      const actual = seg.compSize > 0 ? seg.compSize : seg.uncompSize;
      const readSz = Math.min(actual, totalU - written);
      const readEnd = Math.min(seg.offset + readSz, end);
      if (readEnd > seg.offset) {
        out.set(block.subarray(seg.offset, readEnd), written);
        written += readEnd - seg.offset;
      }
    }
  }
  return written === totalU ? out : out.subarray(0, written);
}

/**
 * Compress raw block bytes into an sges block. Container framing is byte-faithful to the
 * Rust; the deflate payload is fflate raw-deflate. Round-trips through decompressSges and
 * loads in-engine, which is the whole fidelity requirement.
 */
function compressSges(uncompressed, { segmentSize = DEFAULT_SEGMENT_SIZE, level = DEFAULT_LEVEL, major = 4 } = {}) {
  if (!uncompressed.length) throw new Error('Cannot compress empty data');

  const totalU = uncompressed.length;
  const segments = [];
  for (let off = 0; off < totalU; off += segmentSize) {
    const chunk = uncompressed.subarray(off, Math.min(off + segmentSize, totalU));
    const compressed = deflateSync(chunk, { level });
    // Fall back to raw storage when deflate overflows the u16 comp-size limit or fails to shrink.
    if (compressed.length > 65535 || compressed.length >= chunk.length) {
      segments.push({ stored: chunk, uncompSize: chunk.length, isCompressed: false });
    } else {
      segments.push({ stored: compressed, uncompSize: chunk.length, isCompressed: true });
    }
  }

  const n = segments.length;
  const dataStart = align16(16 + n * 8);

  // Lay out each segment at a 16-byte-aligned offset.
  const segOffsets = [];
  let pos = dataStart;
  for (const seg of segments) {
    segOffsets.push(pos);
    pos = align16(pos + seg.stored.length);
  }
  const lastEnd = segOffsets[n - 1] + segments[n - 1].stored.length;
  const totalC = align16(lastEnd);

  const block = new Uint8Array(totalC);
  block[0] = 0x73; block[1] = 0x67; block[2] = 0x65; block[3] = 0x73; // "sges"
  putU16(block, 4, major);
  putU16(block, 6, n);
  putU32(block, 8, totalU);
  putU32(block, 12, totalC);

  for (let i = 0; i < n; i++) {
    const seg = segments[i];
    const base = 16 + i * 8;
    // comp_sz: full-size raw segments (>65535) overflow u16, so store 0 (= default).
    const compSz = !seg.isCompressed && seg.stored.length > 65535 ? 0 : seg.stored.length;
    // uncomp field: 0 for a full-size segment, actual size for the short last one.
    const uncompField = seg.uncompSize === segmentSize ? 0 : seg.uncompSize;
    putU16(block, base, compSz);
    putU16(block, base + 2, uncompField);
    putU32(block, base + 4, (segOffsets[i] >>> 0) | (seg.isCompressed ? 1 : 0));
    block.set(seg.stored, segOffsets[i]);
  }
  return block;
}

/** Is this a raw (uncompressed) container rather than an sges block? Merge/delete move
 *  blocks verbatim, so they never need to know — but inspection does. */
const isSges = (b) => b.length >= 4 && b[0] === 0x73 && b[1] === 0x67 && b[2] === 0x65 && b[3] === 0x73;
const isUcfx = (b) => b.length >= 4 && b[0] === 0x55 && b[1] === 0x43 && b[2] === 0x46 && b[3] === 0x58;


// ===== src/hash.js =====
// The two hashes the WAD format is built on.
//
// Ported from mercs2_formats::hash and mercs2_formats::crc32. Both are tiny and fully
// deterministic, so this port is byte-exact by construction — verified against the recovered
// bone/name pairs and against the CSUM trailers of real containers.

/** pandemic_hash_m2 — FNV-1a 32-bit, case-folded with `| 0x20`, finalised `^ 0x2A` then one
 *  more multiply by the FNV prime. This is the asset-name hash: every asset in the game is
 *  keyed by it, so a new asset's identity is entirely its name hashed through here.
 *  Case-insensitive by design — "MyMod" and "mymod" collide. */
function pandemicHashM2(text) {
  if (!text.length) return 0;
  let h = 0x811c9dc5 >>> 0;
  for (let i = 0; i < text.length; i++) {
    h = (h ^ (text.charCodeAt(i) | 0x20)) >>> 0;
    h = Math.imul(h, 0x01000193) >>> 0;
  }
  h = (h ^ 0x2a) >>> 0;
  return Math.imul(h, 0x01000193) >>> 0;
}

const CRC_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let k = 0; k < 8; k++) c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
    t[n] = c >>> 0;
  }
  return t;
})();

/** Standard CRC-32 (reflected, 0xEDB88320), final XOR 0xFFFFFFFF — the value a UCFX
 *  container stores in its trailing CSUM chunk. `crc32(bytes[:-8])` reproduces the stored
 *  trailer, which is how a repoint re-signs a container it edited. */
function crc32Mercs2(bytes) {
  let crc = 0xffffffff;
  for (let i = 0; i < bytes.length; i++) crc = (CRC_TABLE[(crc ^ bytes[i]) & 0xff] ^ (crc >>> 8)) >>> 0;
  return (crc ^ 0xffffffff) >>> 0;
}

const hex8 = (n) => '0x' + (n >>> 0).toString(16).toUpperCase().padStart(8, '0');

/** Asset names hash case-insensitively into a flat namespace, so keep them distinctive and
 *  lowercase. Mirrors the skinner's sanitizer. */
function sanitizeAssetName(s) {
  return (String(s || '').toLowerCase().replace(/[^a-z0-9_]+/g, '_').replace(/^_+|_+$/g, '') || 'asset').slice(0, 64);
}


// ===== src/block.js =====
// Block-level operations: mint a new asset block, and read what an existing one contains.
//
// A "block" in a patch WAD is one sges-compressed unit. Inside its decompressed bytes is an
// entry table — `[u32 count][count × 16B (name_hash, type_hash, field_c, chunk_size)]`
// followed by the chunk payloads — so one block can hold several assets. The extra/inject
// blocks this tool mints hold exactly one.


// type_id -> the type-name hash the engine keys asset resolution on (pandemic_hash_m2 of the
// LoadAsset type string). Ported from mercs2_smuggler::type_hash_for_type_id.
const TYPE = {
  19: { hash: 0x5b724250, label: 'model' },
  27: { hash: 0xf011157a, label: 'texture' },
  35: { hash: 0x42498680, label: 'script' },
};
const typeLabel = (hash) => {
  for (const id in TYPE) if (TYPE[id].hash === (hash >>> 0)) return TYPE[id].label;
  return null;
};

/** `[u32 count][count × 16B]` entry table at the head of a decompressed block. */
function parseBlockEntryTable(decompressed) {
  if (decompressed.length < 4) return { count: 0, entries: [] };
  const count = u32(decompressed, 0);
  const entries = [];
  for (let i = 0; i < count; i++) {
    const base = 4 + i * 16;
    if (base + 16 > decompressed.length) break;
    entries.push({
      nameHash: u32(decompressed, base),
      typeHash: u32(decompressed, base + 4),
      fieldC: u32(decompressed, base + 8),
      chunkSize: u32(decompressed, base + 12),
    });
  }
  return { count, entries };
}

/**
 * Mint a NEW single-asset block from a raw UCFX container, exactly as
 * mercs2_smuggler's `build_extra`: a block is
 *   [u32 1][name_hash][type_hash][field_c=0][container_len][container...]
 * compressed with sges, carrying one ASET row (`u32_2 = 0x0000FFFF` = no sub block).
 *
 * @param {Uint8Array} container  a UCFX container (a .ucfx from an export bundle, or an
 *                                encoded texture)
 * @param {number} hash           the new asset's name hash
 * @param {number} typeId         19 model / 27 texture / 35 script
 * @returns {PatchBlock}
 */
function makeExtraBlock(container, hash, typeId, pathHint) {
  const t = TYPE[typeId];
  if (!t) throw new Error(`unsupported type_id ${typeId} (need 19 model / 27 texture / 35 script)`);
  if (!isUcfx(container)) throw new Error('not a UCFX container (must start with the UCFX magic)');

  const inner = new Uint8Array(20 + container.length);
  const dv = new DataView(inner.buffer);
  dv.setUint32(0, 1, true);
  dv.setUint32(4, hash >>> 0, true);
  dv.setUint32(8, t.hash >>> 0, true);
  dv.setUint32(12, 0, true); // field_c
  dv.setUint32(16, container.length, true);
  inner.set(container, 20);

  const pages = Math.ceil(inner.length / 0x8000);
  const block = new PatchBlock(
    compressSges(inner),
    pathHint || `blocks\\VZ\\inject_${hex8(hash).slice(2).toLowerCase()}.block`,
    [new AsetEntry(hash, 0xffffffff, 0x0000ffff, typeId)],
  );
  block.packedField = pages;
  return block;
}

/**
 * Describe a block for the UI: its assets, their types, and its decompressed size.
 *
 * Decompression is only for the summary; merge/delete never touch it. `deep=false` reads
 * just enough to get the entry table (cheap on a many-MB block).
 */
function describeBlock(block, { deep = false } = {}) {
  const data = block.compressedData;
  let decomp = null;
  let kind = 'raw';
  try {
    if (isSges(data)) { kind = 'sges'; decomp = decompressSges(data); }
    else if (isUcfx(data)) { kind = 'ucfx'; decomp = data; }
    else decomp = data;
  } catch {
    decomp = null;
  }

  const info = {
    path: block.pathString,
    kind,
    compressedBytes: data.length,
    decompressedBytes: decomp ? decomp.length : null,
    asetHashes: block.asetEntries.map((e) => ({
      hash: hex8(e.assetHash),
      sub: (e.u32_2 & 0xffff) === 0xffff ? null : (e.u32_2 & 0xffff),
      typeId: e.u32_3,
      typeLabel: TYPE[e.u32_3] ? TYPE[e.u32_3].label : String(e.u32_3),
    })),
    assets: [],
  };

  if (decomp && (deep || info.asetHashes.length === 0)) {
    const { entries } = parseBlockEntryTable(decomp);
    info.assets = entries.map((e) => ({
      hash: hex8(e.nameHash),
      type: typeLabel(e.typeHash) || hex8(e.typeHash),
      chunkBytes: e.chunkSize,
    }));
  }
  return info;
}


// ===== src/wad.js =====
// A patch WAD you can manage: the add / merge / delete verbs the UI drives.
//
// Everything here is a thin, honest wrapper over patch_wad.js. The one rule it enforces that
// the low-level writer does not is the `sub`-index correction: a block's `sub` field is an
// ABSOLUTE block index, and the writer only rewrites the high half of the ASET record, so
// appending blocks ahead of a sub-referencing block would leave it pointing at the wrong
// place. readPatchWad already re-groups ASET rows by block, so a block loaded from an
// existing WAD keeps its OWN sub relative to the merged layout — the danger is only when
// ADDING a new multi-block asset, which addAsset handles explicitly.


class WadDoc {
  /** @param {{blocks: PatchBlock[], csumValue: number}} contents */
  constructor(contents) {
    this.blocks = contents.blocks;
    this.csumValue = contents.csumValue;
  }

  /** Empty patch, or parse existing bytes. */
  static empty() { return new WadDoc({ blocks: [], csumValue: 0 }); }
  static fromBytes(raw) { return new WadDoc(readPatchWad(raw)); }

  /** Serialize back to WAD bytes. Byte-faithful framing; see sges.js on the payload. */
  toBytes() {
    return buildPatchWadMulti(this.blocks, this.csumValue, null, FFCS_CERT_BLOB);
  }

  list() {
    return this.blocks.map((b, i) => ({ index: i, ...describeBlock(b) }));
  }

  /** Every asset hash this WAD publishes, and which block owns it — for collision checks. */
  assetIndex() {
    const map = new Map();
    this.blocks.forEach((b, bi) => {
      for (const e of b.asetEntries) map.set(e.assetHash >>> 0, { block: bi, typeId: e.u32_3 });
    });
    return map;
  }

  /**
   * Add a single-asset block from a UCFX container under a NEW name.
   *
   * @param {{name?, hash?, typeId, container: Uint8Array, sub?: PatchBlock}} o
   *   sub — an optional finer-LOD block to ship alongside (the two-block vehicle/character
   *   case). When present, the primary's ASET row is pointed at it and it is appended with
   *   no ASET row of its own, matching how the base game stores finer rungs.
   * @returns {{hash, index, warnings: string[]}}
   */
  addAsset({ name, hash, typeId, container, sub = null }) {
    const h = hash !== undefined ? (hash >>> 0) : pandemicHashM2(name);
    if (!TYPE[typeId]) throw new Error(`unsupported type_id ${typeId}`);
    const warnings = [];

    const existing = this.assetIndex();
    if (existing.has(h)) {
      warnings.push(`0x${h.toString(16).toUpperCase()} already exists in this WAD (block ${existing.get(h).block}); it will be shadowed by load order, not replaced. Rename to avoid ambiguity.`);
    }

    const primary = makeExtraBlock(container, h, typeId,
      name ? `blocks\\VZ\\${name}_P000.block` : undefined);

    if (sub) {
      // The sub block is added FIRST so its index is known, then referenced. Its own ASET
      // rows are dropped: a finer rung is reached only through the parent's sub.
      const subIndex = this.blocks.length + 1; // primary goes at length, sub right after
      primary.asetEntries[0] = new AsetEntry(h, 0xffffffff, subIndex & 0xffff, typeId);
      const subBlock = new PatchBlock(sub.compressedData,
        name ? `blocks\\VZ\\${name}_P001.block` : `blocks\\VZ\\sub_${hex8(h).slice(2).toLowerCase()}.block`,
        []);
      subBlock.packedField = sub.packedField;
      this.blocks.push(primary, subBlock);
      return { hash: h, index: this.blocks.length - 2, warnings };
    }

    this.blocks.push(primary);
    return { hash: h, index: this.blocks.length - 1, warnings };
  }

  /** Add an already-framed PatchBlock (e.g. one carved out of another WAD). */
  addBlock(block) {
    this.blocks.push(block);
    return { index: this.blocks.length - 1 };
  }

  /**
   * Merge another patch WAD's blocks in.
   *
   * @param {Uint8Array} otherBytes
   * @param {{replace?: boolean}} opts  replace matches by path, else append
   * @returns {{added: number, replaced: number, warnings: string[]}}
   */
  merge(otherBytes, { replace = false } = {}) {
    const other = readPatchWad(otherBytes);
    const warnings = [];
    const mineByHash = this.assetIndex();
    let added = 0, replaced = 0;

    for (const nb of other.blocks) {
      // Collision surfacing: a merged block that publishes a hash we already have.
      for (const e of nb.asetEntries) {
        if (mineByHash.has(e.assetHash >>> 0)) {
          warnings.push(`Both WADs publish ${hex8(e.assetHash)} — after merge, load order decides which wins.`);
        }
      }
      if (replace) {
        const idx = this.blocks.findIndex((old) => old.pathString === nb.pathString);
        if (idx >= 0) { this.blocks[idx] = nb; replaced++; continue; }
      }
      this.blocks.push(nb);
      added++;
    }
    return { added, replaced, warnings };
  }

  /** Remove a block by index. Returns the removed block's summary, or null. */
  deleteBlock(index) {
    if (index < 0 || index >= this.blocks.length) return null;
    const [removed] = this.blocks.splice(index, 1);
    // A block that some other block's `sub` pointed at is now gone. Flag it rather than
    // silently producing a WAD that references a missing rung.
    const orphaned = [];
    this.blocks.forEach((b, bi) => {
      for (const e of b.asetEntries) {
        const sub = e.u32_2 & 0xffff;
        if (sub !== 0xffff && sub === index) orphaned.push(hex8(e.assetHash));
      }
    });
    return { removed: describeBlock(removed), orphaned };
  }

  /** Remove every block that publishes `hash` (and warn if it leaves a dangling sub). */
  deleteAsset(hash) {
    const h = hash >>> 0;
    const idx = this.blocks.findIndex((b) => b.asetEntries.some((e) => (e.assetHash >>> 0) === h));
    if (idx < 0) return null;
    return this.deleteBlock(idx);
  }
}


// ===== src/ui/app.js =====
// wad-simulator-js UI.
//
// A patch WAD is otherwise a 100 MB binary blob nobody can see inside. This opens one, shows
// every block and the assets it publishes, and lets you add / merge / delete — then hands
// back a WAD the game loads. The whole engine is the byte-faithful port in src/; this file
// is only wiring.
//
// It keeps the skinner's shape on purpose: a card to choose what you're doing, one guided
// panel at a time, and a verdict after anything you drop, so "did it work?" is answered where
// you're looking instead of being inferred from silence.


const S = { doc: null, name: 'my-patch.wad' };

function boot() {
  renderStart();
}

// ---------------------------------------------------------------- start
function renderStart() {
  const root = $('#app');
  root.innerHTML = '';
  root.appendChild(el('div', 'lead',
    'Open a patch WAD to see and change what is inside it, or start an empty one. '
    + 'Everything happens in your browser — nothing is uploaded.'));

  const cards = el('div', 'cards');

  const openCard = el('button', 'card');
  openCard.appendChild(el('div', 'card-icon', '📂'));
  openCard.appendChild(el('div', 'card-t', 'Open a WAD'));
  openCard.appendChild(el('div', 'card-s', 'Drop an existing vz-patch.wad to inspect, add to, or trim it.'));
  const openInput = el('input');
  openInput.type = 'file';
  openInput.accept = '.wad';
  openInput.style.display = 'none';
  openCard.appendChild(openInput);
  openCard.addEventListener('click', () => openInput.click());
  openInput.addEventListener('change', (e) => { if (e.target.files[0]) openWad(e.target.files[0]); });
  cards.appendChild(openCard);

  const newCard = el('button', 'card');
  newCard.appendChild(el('div', 'card-icon', '✨'));
  newCard.appendChild(el('div', 'card-t', 'Start empty'));
  newCard.appendChild(el('div', 'card-s', 'Build a fresh patch from scratch by adding assets one at a time.'));
  newCard.addEventListener('click', () => { S.doc = WadDoc.empty(); S.name = 'my-patch.wad'; renderManager(); });
  cards.appendChild(newCard);

  root.appendChild(cards);

  // A drop zone spanning both, so dragging a WAD anywhere works.
  const drop = el('label', 'drop');
  drop.appendChild(el('b', null, '…or drop a .wad here'));
  drop.appendChild(el('span', 'hint', 'Windows: your game\'s data\\vz-patch.wad'));
  const dropInput = el('input');
  dropInput.type = 'file';
  dropInput.accept = '.wad';
  drop.appendChild(dropInput);
  wireDrop(drop, dropInput, (files) => { if (files[0]) openWad(files[0]); });
  root.appendChild(drop);

  root.appendChild(el('div', 'note',
    'New to this? A patch WAD is a mod file the game loads on top of its own data — it '
    + 'never changes the base game. This tool reads and writes them; it does not make skins. '
    + 'For that, use the skinner and bring its output here to pack.'));
}

async function openWad(file) {
  const root = $('#app');
  try {
    const bytes = await readFileBytes(file);
    S.doc = WadDoc.fromBytes(bytes);
    S.name = file.name || 'patch.wad';
    renderManager();
  } catch (e) {
    const box = el('div');
    box.appendChild(verdict({
      ok: false, title: 'That is not a patch WAD',
      lines: [{ k: 'file', v: file.name, ok: false }, { k: 'reason', v: e.message }],
      hint: 'A patch WAD starts with the bytes "FFCS". This looks like something else — '
        + 'a base vz.wad, a texture, or an unrelated file.',
    }));
    root.appendChild(box);
  }
}

// ---------------------------------------------------------------- manager
function renderManager() {
  const root = $('#app');
  root.innerHTML = '';

  // header: name + summary + save/close
  const bar = el('div', 'bar');
  const idx = S.doc.assetIndex();
  bar.appendChild(el('div', 'bar-title', S.name));
  bar.appendChild(el('div', 'bar-sub',
    `${S.doc.blocks.length} block${S.doc.blocks.length === 1 ? '' : 's'} · ${idx.size} asset${idx.size === 1 ? '' : 's'}`));
  const spacer = el('div');
  spacer.style.flex = '1';
  bar.appendChild(spacer);

  const save = el('button', 'btn', 'Save WAD');
  save.disabled = !S.doc.blocks.length;
  save.addEventListener('click', () => {
    const bytes = S.doc.toBytes();
    downloadBytes(S.name, bytes);
    flash(verdict({
      ok: true, title: 'Saved',
      lines: [{ k: 'file', v: S.name }, { k: 'size', v: fmtBytes(bytes.length) }, { k: 'blocks', v: String(S.doc.blocks.length) }],
      hint: 'Drop this in your game as data\\vz-patch.wad, or import it in the modkit to '

  const addZone = el('label', 'drop small');

  actions.appendChild(addZone);

  const mergeZone = el('label', 'drop small');
  mergeZone.appendChild(el('b', null, '⤵ Merge another WAD'));
  mergeZone.appendChild(el('span', 'hint', 'drop a second .wad; its blocks are appended'));
  const mergeInput = el('input');
  mergeInput.type = 'file';
  mergeInput.accept = '.wad';
  mergeZone.appendChild(mergeInput);
  wireDrop(mergeZone, mergeInput, (files) => { if (files[0]) mergeWad(files[0]); });
  actions.appendChild(mergeZone);

  root.appendChild(actions);

  const out = el('div');
  out.id = 'op-out';
  root.appendChild(out);

  // block table
  root.appendChild(renderTable());
}

function renderTable() {
  const wrap = el('div', 'table-wrap');
  if (!S.doc.blocks.length) {
    wrap.appendChild(el('div', 'empty', 'No blocks yet. Add an asset above, or merge another WAD.'));
    return wrap;
  }
  const table = el('table', 'blocks');
  const head = el('tr');
  for (const h of ['#', 'kind', 'assets', 'path', 'size', '']) head.appendChild(el('th', null, h));
  table.appendChild(head);

  for (const b of S.doc.list()) {
    const tr = el('tr');
    tr.appendChild(el('td', 'mono dim', String(b.index)));
    const kindTd = el('td');
    kindTd.appendChild(kindChip(b));
    tr.appendChild(kindTd);

    const assets = el('td');
    if (b.asetHashes.length) {
      for (const a of b.asetHashes) {
        const chip = el('span', 'asset-chip');
        chip.appendChild(el('span', 'asset-h', a.hash));
        chip.appendChild(el('span', 'asset-t', a.typeLabel));
        if (a.sub !== null) chip.appendChild(el('span', 'asset-sub', `→ block ${a.sub}`));
        assets.appendChild(chip);
      }
    } else {
      assets.appendChild(el('span', 'dim', 'none (reached via a sub-pointer)'));
    }
    tr.appendChild(assets);

    tr.appendChild(el('td', 'mono path', b.path));
    tr.appendChild(el('td', 'mono dim', fmtBytes(b.compressedBytes)));

    const act = el('td');
    const del = el('button', 'btn tiny danger', 'Delete');
    del.addEventListener('click', () => deleteBlock(b.index));
    act.appendChild(del);
    tr.appendChild(act);

    table.appendChild(tr);
  }
  wrap.appendChild(table);
  return wrap;
}

function kindChip(b) {
  const span = el('span', 'kind-chip ' + b.kind);
  span.textContent = b.kind;
  return span;
}

// ---------------------------------------------------------------- operations
async function addAssets(files) {
  const containers = files.filter((f) => /\.(ucfx|bin)$/i.test(f.name));
  if (!containers.length) {
    return flash(verdict({
      ok: false, title: 'Nothing to add',
      lines: [{ k: 'dropped', v: `${files.length} file(s)`, ok: false }],
      hint: 'Add a .ucfx container — a model or texture asset. If you have a PNG, encode it '
        + 'to a texture container in the skinner first.',
    }));
  }
  const results = [];
  for (const f of containers) {
    const bytes = await readFileBytes(f);
    if (!isUcfx(bytes)) {
      results.push({ ok: false, name: f.name, msg: 'not a UCFX container (wrong magic)' });
      continue;
    }
    const base = sanitizeAssetName(f.name.replace(/\.(ucfx|bin)$/i, ''));
    const { name, typeId } = await promptNameAndType(base);
    if (!name) { results.push({ ok: false, name: f.name, msg: 'cancelled' }); continue; }
    try {
      const res = S.doc.addAsset({ name, typeId, container: bytes });
      results.push({ ok: true, name, hash: hex8(res.hash), warnings: res.warnings });
    } catch (e) {
      results.push({ ok: false, name: f.name, msg: e.message });
    }
  }
  renderManager();
  const okc = results.filter((r) => r.ok).length;
  flash(verdict({
    ok: okc > 0,
    title: okc ? `Added ${okc} asset${okc === 1 ? '' : 's'}` : 'Nothing added',
    lines: results.map((r) => r.ok
      ? { k: r.name, v: r.hash + (r.warnings.length ? '  ⚠' : '') }
      : { k: r.name, v: r.msg, ok: false }),
    hint: results.some((r) => r.ok && r.warnings.length)
      ? 'A ⚠ marks a name whose hash already exists in this WAD — rename it, or it will be '
        + 'shadowed by load order rather than added.' : undefined,
  }));
}

async function mergeWad(file) {
  try {
    const bytes = await readFileBytes(file);
    const rep = S.doc.merge(bytes);
    renderManager();
    flash(verdict({
      ok: true, title: `Merged ${file.name}`,
      lines: [
        { k: 'blocks added', v: String(rep.added) },
        ...(rep.replaced ? [{ k: 'replaced', v: String(rep.replaced) }] : []),
        ...(rep.warnings.length ? [{ k: 'collisions', v: String(rep.warnings.length), ok: false }] : []),
      ],
      hint: rep.warnings.length
        ? rep.warnings[0] + (rep.warnings.length > 1 ? ` (+${rep.warnings.length - 1} more)` : '')
        : 'Every block appended cleanly with no asset-hash collisions.',
    }));
  } catch (e) {
    flash(verdict({ ok: false, title: 'Merge failed', lines: [{ k: file.name, v: e.message, ok: false }] }));
  }
}

function deleteBlock(index) {
  const res = S.doc.deleteBlock(index);
  renderManager();
  if (!res) return;
  flash(verdict({
    ok: res.orphaned.length === 0,
    title: `Deleted block ${index}`,
    lines: res.removed.asetHashes.length
      ? res.removed.asetHashes.map((a) => ({ k: 'removed', v: `${a.hash} (${a.typeLabel})` }))
      : [{ k: 'removed', v: res.removed.path }],
    hint: res.orphaned.length
      ? `⚠ ${res.orphaned.join(', ')} pointed at this block for detail and now dangles. `
        + 'Their model will fail to resolve its finer LOD. Delete or re-add them too.'
      : undefined,
  }));
}

// ---------------------------------------------------------------- little modal
function promptNameAndType(base) {
  return new Promise((resolve) => {
    const back = el('div', 'modal-back');
    const box = el('div', 'modal');
    box.appendChild(el('div', 'modal-t', 'Name the new asset'));
    box.appendChild(el('div', 'note',
      'The name IS the asset — it is hashed into the game\'s flat namespace, and that hash '
      + 'is how anything refers to it. Keep it distinctive and lowercase.'));

    const nameWrap = el('label', 'field');
    nameWrap.appendChild(el('span', null, 'asset name'));
    const name = el('input');
    name.type = 'text';
    name.value = base;
    name.spellcheck = false;
    nameWrap.appendChild(name);
    box.appendChild(nameWrap);

    const hashLine = el('div', 'mono dim hashline');
    const upd = () => { hashLine.textContent = sanitizeAssetName(name.value) + '  =  ' + hex8(pandemicHashM2(sanitizeAssetName(name.value))); };
    name.addEventListener('input', upd); upd();
    box.appendChild(hashLine);

    const typeWrap = el('label', 'field');
    typeWrap.appendChild(el('span', null, 'type'));
    const type = el('select');
    for (const id of [27, 19, 35]) {
      const o = el('option', null, `${id} — ${TYPE[id].label}`);
      o.value = String(id);
      type.appendChild(o);
    }
    typeWrap.appendChild(type);
    box.appendChild(typeWrap);

    const row = el('div', 'modal-actions');
    const cancel = el('button', 'btn ghost', 'Cancel');
    cancel.addEventListener('click', () => { back.remove(); resolve({}); });
    const ok = el('button', 'btn', 'Add');
    ok.addEventListener('click', () => {
      back.remove();
      resolve({ name: sanitizeAssetName(name.value), typeId: Number(type.value) });
    });
    row.appendChild(cancel); row.appendChild(ok);
    box.appendChild(row);

    back.appendChild(box);
    document.body.appendChild(back);
    name.focus(); name.select();
  });
}

function flash(node) {
  const out = $('#op-out');
  if (!out) return;
  out.innerHTML = '';
  out.appendChild(node);
}


boot();
</script>
