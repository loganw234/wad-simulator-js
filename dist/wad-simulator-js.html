<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>wad-simulator-js — manage Mercenaries 2 patch WADs in your browser</title>
<style>
  :root {
    --bg:#0b1220; --panel:#111a2b; --panel2:#16213a; --line:#223049;
    --fg:#e2e8f0; --dim:#94a3b8; --faint:#64748b;
    --ok:#4ade80; --warn:#fbbf24; --bad:#f87171; --accent:#60a5fa;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font:13px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
  code, pre, .mono { font-family:ui-monospace, "Cascadia Code", Consolas, monospace; }
  header { padding:14px 20px; border-bottom:1px solid var(--line); background:var(--panel);
           display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; font-weight:600; }
  header .sub { color:var(--faint); font-size:12px; }
  header .badge { margin-left:auto; font-size:10px; letter-spacing:.06em; font-weight:600;
                  color:#86efac; border:1px solid #1e5236; background:#0f2a1c;
                  padding:2px 8px; border-radius:10px; }
  main { max-width:1200px; margin:0 auto; padding:20px; }
  .lead { color:var(--dim); margin-bottom:16px; max-width:70ch; }
  .note { color:var(--dim); font-size:12px; margin-top:16px; line-height:1.55; max-width:74ch;
          border-top:1px solid var(--line); padding-top:12px; }

  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:12px; margin-bottom:14px; }
  .card { display:flex; flex-direction:column; align-items:center; gap:8px; text-align:center;
          background:var(--panel); border:1px solid var(--line); border-radius:10px;
          padding:20px 16px; cursor:pointer; color:var(--fg); font:inherit; transition:.12s; }
  .card:hover { border-color:var(--accent); background:#18243b; transform:translateY(-2px); }
  .card-icon { font-size:26px; }
  .card-t { font-weight:600; }
  .card-s { color:var(--dim); font-size:12px; line-height:1.45; }
  .card.feature { border-color:#2f4a6d; background:var(--panel2); }
  .card.feature:hover { border-color:var(--accent); }

  /* rail (guided pack path) */
  .step { border:1px solid var(--line); border-radius:10px; margin-bottom:8px;
          background:var(--panel); overflow:hidden; }
  .step.open { border-color:#2f4a6d; background:var(--panel2); }
  .step.locked { opacity:.4; }
  .step-head { display:flex; align-items:center; gap:10px; width:100%; padding:12px 14px;
               background:none; border:0; color:var(--fg); font:inherit; text-align:left; }
  .step-head.clickable { cursor:pointer; }
  .step-head.clickable:hover { background:#18243b; }
  .step-n { flex:none; width:22px; height:22px; line-height:22px; text-align:center;
            border-radius:50%; background:var(--panel); color:var(--faint);
            border:1px solid var(--line); font-size:11px; }
  .step.open .step-n { background:var(--accent); color:#06121f; border-color:var(--accent); font-weight:700; }
  .step.done .step-n { background:#123324; color:var(--ok); border-color:#1e5236; }
  .step-t { font-weight:600; }
  .step.locked .step-t, .step.done .step-t { font-weight:400; color:var(--dim); }
  .step-sum { color:var(--ok); font-size:12px; margin-left:auto; font-family:ui-monospace,monospace; }
  .step-lock { margin-left:auto; font-size:10px; color:var(--faint); text-transform:uppercase; letter-spacing:.08em; }
  .step-body { padding:2px 16px 18px; }
  .step-body > p { color:var(--dim); margin:0 0 14px; max-width:70ch; }
  .step-actions { display:flex; gap:10px; align-items:center; margin-top:14px; flex-wrap:wrap; }
  .sample-row { margin-top:14px; padding-top:12px; border-top:1px solid var(--line); }
  .sample-row .note { border-top:0; padding-top:6px; margin-top:6px; }

  .drop { display:block; border:1.5px dashed var(--line); border-radius:8px; padding:16px;
          text-align:center; cursor:pointer; background:var(--panel); transition:.12s; }
  .drop.small { padding:14px; }
  .drop:hover, .drop.over { border-color:var(--accent); background:var(--panel2); }
  .drop input { display:none; }
  .drop b { display:block; margin-bottom:3px; }
  .drop .hint { display:block; color:var(--faint); font-size:12px; }

  .bar { display:flex; align-items:center; gap:12px; padding:12px 14px; background:var(--panel);
         border:1px solid var(--line); border-radius:10px; margin-bottom:12px; flex-wrap:wrap; }
  .bar-title { font-weight:600; font-family:ui-monospace,monospace; }
  .bar-sub { color:var(--faint); font-size:12px; }
  .actions { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
  @media (max-width:640px){ .actions { grid-template-columns:1fr; } }

  .btn { background:var(--accent); color:#06121f; border:0; border-radius:6px; padding:8px 14px;
         font:inherit; font-weight:600; cursor:pointer; }
  .btn.ghost { background:var(--panel2); color:var(--fg); border:1px solid var(--line); font-weight:400; }
  .btn.tiny { padding:4px 10px; font-size:12px; }
  .btn.danger { background:#3a1518; color:#fca5a5; border:1px solid #5a2020; font-weight:400; }
  .btn.danger:hover { background:#4a1a1e; }
  .btn:disabled { opacity:.45; cursor:not-allowed; }

  .table-wrap { overflow-x:auto; border:1px solid var(--line); border-radius:10px; }
  table.blocks { border-collapse:collapse; width:100%; font-size:12px; }
  table.blocks th { text-align:left; color:var(--faint); font-weight:600; text-transform:uppercase;
                    letter-spacing:.06em; font-size:10px; padding:9px 12px; border-bottom:1px solid var(--line);
                    background:var(--panel); position:sticky; top:0; }
  table.blocks td { padding:9px 12px; border-bottom:1px solid var(--line); vertical-align:top; }
  table.blocks tr:last-child td { border-bottom:0; }
  table.blocks tr:hover td { background:var(--panel2); }
  .dim { color:var(--faint); }
  .path { color:var(--dim); max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .empty { padding:28px; text-align:center; color:var(--faint); }

  .kind-chip { font-size:10px; padding:2px 8px; border-radius:10px; border:1px solid var(--line);
               color:var(--dim); text-transform:uppercase; letter-spacing:.05em; }
  .kind-chip.sges { color:var(--accent); border-color:#1e3a5f; }
  .kind-chip.ucfx { color:var(--ok); border-color:#1e5236; }
  .asset-chip { display:inline-flex; align-items:center; gap:6px; margin:0 6px 4px 0;
                background:var(--panel2); border:1px solid var(--line); border-radius:6px; padding:2px 8px; }
  .asset-h { font-family:ui-monospace,monospace; }
  .asset-t { font-size:10px; color:var(--faint); text-transform:uppercase; }
  .asset-sub { font-size:10px; color:var(--warn); }
  .kind-chip.note { color:var(--faint); border-style:dashed; }

  /* plain-language identity: type chip + override/new badge + reversed name */
  .asset-line { display:flex; align-items:center; gap:8px; margin-bottom:3px; flex-wrap:wrap; }
  .type-chip { font-size:10px; font-weight:600; padding:2px 8px; border-radius:10px;
               letter-spacing:.03em; border:1px solid var(--line); color:var(--fg); background:var(--panel2); }
  .type-chip.t27 { color:#7dd3fc; border-color:#1e3a5f; }  /* texture */
  .type-chip.t19 { color:#c4b5fd; border-color:#3b2f6d; }  /* model */
  .type-chip.t35 { color:#fca5a5; border-color:#5f1e1e; }  /* script */
  .type-chip.t23 { color:#fcd34d; border-color:#5f4a1e; }  /* ui movie */
  .verdict-badge { font-size:10px; padding:2px 7px; border-radius:10px; cursor:help; }
  .verdict-badge.override { color:#86efac; background:#0f2a1c; border:1px solid #1e5236; }
  .verdict-badge.new { color:#93c5fd; background:#0f1e34; border:1px solid #1e3a5f; }
  .asset-name { margin-bottom:3px; }
  .known-name { font-weight:600; color:var(--fg); }
  .blurb { display:block; color:var(--faint); font-size:11px; line-height:1.4; margin-top:1px; }

  /* mod grouping */
  .mod-head { display:flex; align-items:center; gap:10px; flex-wrap:wrap;
              margin:18px 0 6px; padding:8px 12px; border:1px solid var(--line);
              border-radius:8px 8px 0 0; border-bottom:0; background:var(--panel); }
  .mod-head.named { border-left:3px solid var(--accent); }
  .mod-badge { font-size:9px; font-weight:700; letter-spacing:.08em; color:#86efac;
               border:1px solid #1e5236; background:#0f2a1c; padding:1px 6px; border-radius:8px; }
  .mod-name { font-weight:600; }
  .mod-meta { color:var(--faint); font-size:12px; }
  .mod-head .btn.tiny { margin-left:auto; }
  .mod-desc { flex-basis:100%; color:var(--dim); font-size:12px; margin-top:2px; }

  /* how-it-works */
  details.how { margin-top:18px; border:1px solid var(--line); border-radius:8px; background:var(--panel); }
  details.how > summary { cursor:pointer; padding:11px 14px; font-weight:600; font-size:13px; color:var(--accent); }
  details.how[open] > summary { border-bottom:1px solid var(--line); }
  .how-flow { display:flex; align-items:stretch; gap:10px; padding:14px; flex-wrap:wrap; }
  .how-box { flex:1; min-width:180px; border:1px solid var(--line); border-radius:8px; padding:12px; background:var(--panel2); }
  .how-icon { font-size:22px; margin-bottom:4px; }
  .how-t { font-weight:600; margin-bottom:4px; }
  .how-s { color:var(--dim); font-size:12px; line-height:1.45; }
  .how-arrow { align-self:center; color:var(--faint); font-size:18px; }
  details.how .note { padding:0 14px 14px; margin-top:0; }

  .verdict { border:1px solid var(--line); border-left-width:3px; border-radius:8px;
             padding:11px 13px; margin:0 0 14px; background:var(--panel); }
  .verdict.ok { border-left-color:var(--ok); }
  .verdict.bad { border-left-color:var(--bad); }
  .verdict-h { display:flex; align-items:center; gap:8px; font-weight:600; margin-bottom:7px; }
  .verdict.ok .verdict-i { color:var(--ok); } .verdict.bad .verdict-i { color:var(--bad); }
  .verdict-row { display:grid; grid-template-columns:130px 1fr; gap:10px; font-size:12px; padding:2px 0; color:var(--dim); }
  .verdict-row.bad .verdict-v { color:var(--bad); }
  .verdict-k { color:var(--faint); }
  .verdict-v { font-family:ui-monospace,monospace; word-break:break-all; }
  .verdict-hint { margin-top:8px; font-size:12px; color:var(--warn); line-height:1.5; }

  .modal-back { position:fixed; inset:0; background:rgba(4,8,15,.72); display:flex;
                align-items:center; justify-content:center; z-index:50; }
  .modal { background:var(--panel); border:1px solid var(--line); border-radius:12px;
           padding:18px; width:min(440px,92vw); }
  .modal-t { font-weight:600; margin-bottom:8px; }
  .field { display:block; margin:12px 0; }
  .field span { display:block; color:var(--dim); font-size:12px; margin-bottom:4px; }
  .field input, .field select { width:100%; background:var(--panel2); color:var(--fg);
           border:1px solid var(--line); border-radius:5px; padding:8px 10px; font:inherit; }
  .field select { appearance:none; -webkit-appearance:none; cursor:pointer; }
  .hashline { font-size:12px; margin:-4px 0 4px; }
  .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:14px; }
  a { color:var(--accent); }
</style>
</head>

// Shared DOM helpers + a file/drop utility for the WAD and container inputs.

const $ = (s) => document.querySelector(s);

const el = (tag, cls, txt) => {
  const e = document.createElement(tag);

  if (txt !== undefined) e.textContent = txt;
  return e;
};

const fmtBytes = (n) => {
  if (n == null) return '—';
  if (n < 1024) return `${n} B`;
  if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
  return `${(n / 1024 / 1024).toFixed(2)} MB`;
};

/** Wire a drop zone + hidden file input to one handler(files: File[]). */
function wireDrop(zone, input, handler) {
  input.addEventListener('change', (e) => handler([...e.target.files]));
  zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('over'));
  zone.addEventListener('drop', (e) => {
    e.preventDefault();
    zone.classList.remove('over');
    handler([...e.dataTransfer.files]);
  });
}

export async function readFileBytes(file) {
  return new Uint8Array(await file.arrayBuffer());
}

function downloadBytes(name, bytes) {
  const a = el('a');
  a.href = URL.createObjectURL(new Blob([bytes], { type: 'application/octet-stream' }));
  a.download = name;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

/** A verdict card — same idea as the skinner's: answer "did it work?" on screen. */
function verdict({ ok, title, lines = [], hint }) {
  const box = el('div', `verdict ${ok ? 'ok' : 'bad'}`);
  const h = el('div', 'verdict-h');
  h.appendChild(el('span', 'verdict-i', ok ? '✓' : '✕'));
  h.appendChild(el('span', null, title));
  box.appendChild(h);
  for (const l of lines) {
    const row = el('div', `verdict-row${l.ok === false ? ' bad' : ''}`);
    row.appendChild(el('span', 'verdict-k', l.k));
    row.appendChild(el('span', 'verdict-v', l.v));
    box.appendChild(row);
  }
  if (hint) box.appendChild(el('div', 'verdict-hint', hint));
  return box;
}

// A rail: one step open at a time, finished ones collapsed to a tick, later ones locked.
// Same design as the skinner's — a beginner is never left facing every choice at once, and
// never able to skip ahead of a step that has to happen first.


class Rail {
  constructor(root) {
    this.root = root;
    this.steps = [];
    this.open = 0;
    this.onFinish = null;
  }

  add(id, title, render, summary) {
    this.steps.push({ id, title, render, summary, done: false });
    return this;
  }

  complete(id) {
    const i = this.steps.findIndex((s) => s.id === id);
    if (i < 0) return;
    this.steps[i].done = true;
    if (this.open === i) this.open = i + 1;
    this.draw();
    if (this.open >= this.steps.length && this.onFinish) this.onFinish();
  }

  reopen(id) {
    const i = this.steps.findIndex((s) => s.id === id);
    if (i < 0) return;
    this.open = i;
    for (let k = i; k < this.steps.length; k++) this.steps[k].done = false;
    this.draw();
  }

  draw() {
    this.root.innerHTML = '';
    this.steps.forEach((s, i) => {
      const locked = i > this.open;
      const isOpen = i === this.open;
      const wrap = el('div', `step${isOpen ? ' open' : ''}${locked ? ' locked' : ''}${s.done && !isOpen ? ' done' : ''}`);
      const head = el('button', 'step-head');
      head.type = 'button';
      head.appendChild(el('span', 'step-n', s.done && !isOpen ? '✓' : String(i + 1)));
      head.appendChild(el('span', 'step-t', s.title));
      if (s.done && !isOpen && s.summary) head.appendChild(el('span', 'step-sum', s.summary() || ''));
      if (locked) head.appendChild(el('span', 'step-lock', 'locked'));
      if (s.done && !isOpen) {
        head.addEventListener('click', () => this.reopen(s.id));
        head.classList.add('clickable');
      } else head.disabled = true;
      wrap.appendChild(head);
      if (isOpen) {
        const body = el('div', 'step-body');
        wrap.appendChild(body);
        s.render(body, this);
      }
      this.root.appendChild(wrap);
    });
  }
}

// The one subtlety worth stating up front: the ASET record's `u32_2` low 16 bits are the
// `sub` field (the block a model's finer LOD rungs live in) and the HIGH 16 bits are the
// block index — and the WRITER assigns the high half from output position while carrying the
// low half through untouched. So a block's output order matters, and `sub` is an ABSOLUTE
// index that a merge shifts. Both the character clone and the two-block vehicle clone ride
// on exactly this.


const PAGE_SIZE = 0x8000; // 32 KB

const PTHS_TRAILER = new TextEncoder().encode(

  'a4f5de65892ffee33a44569bebf21f66d22e54a22347efd375981188743afd9' +
  '9baacc342d88a99321235798725fedcbf43252669dade32415fee89da543bf23' +
  'd4ex');

  0xf8, 0xab, 0x0a, 0x3b, 0x3e, 0xf1, 0x5e, 0x66, 0xd0, 0xf6, 0x53, 0xf7, 0x78, 0xe9, 0xe5, 0x39,
  0x5a, 0x54, 0x22, 0xc1, 0x54, 0x1a, 0xb8, 0xe6, 0x87, 0x4d, 0xdf, 0xe8, 0xc7, 0x59, 0x73, 0x20,
  0x4e, 0x90, 0x0b, 0x60, 0x14, 0x3c, 0x27, 0xe5, 0x61, 0x2d, 0x98, 0xde, 0xce, 0x7a, 0xe7, 0x99,
  0x55, 0x65, 0x16, 0x18, 0x5d, 0xc3, 0x47, 0x56, 0xbc, 0x8d, 0x0b, 0xfa, 0x50, 0x42, 0x72, 0x5b,

  0x14, 0x63, 0xfe, 0xbc, 0x5a, 0xbd, 0x08, 0x56, 0x7f, 0x80, 0x10, 0x63, 0x6a, 0xdf, 0xb9, 0x59,

/** One ASET asset record. `u32_1` defaults to 0xFFFFFFFF when unset. */
class AsetEntry {
  constructor(assetHash, u1, u2, u3) {
    this.assetHash = assetHash >>> 0;
    this.u32_1 = u1 >>> 0;
    this.u32_2 = u2 >>> 0;
    this.u32_3 = u3 >>> 0;
  }
}

/** One block destined for a patch WAD. Defaults match the Rust dataclass. */
class PatchBlock {
  constructor(compressedData, pathString, asetEntries) {
    this.compressedData = compressedData;
    this.pathString = pathString;
    this.asetEntries = asetEntries || [];
    this.packedField = 1;
    this.flags = 0x8000;
  }
}

/**
 * Build a PC FFCS patch WAD from one or more blocks.
 *
 * @param {PatchBlock[]} blocks
 * @param {number} csumValue  the CSUM chunk's offset field (0 for a from-scratch build)
 * @param {number|null} csumMeta  CSUM meta; when null, auto-detected from the resident block's ASET count
 * @param {Uint8Array} certBlob

function buildPatchWadMulti(blocks, csumValue = 0, csumMeta = null, certBlob = FFCS_CERT_BLOB) {
  const numBlocks = blocks.length;

  const indxOffset = 0x8000;
  const indxSize = numBlocks * 12;
  const asetOffset = indxOffset + indxSize;

  // (block index, entry) flattened in block order.
  const allAset = [];
  blocks.forEach((blk, bi) => { for (const e of blk.asetEntries) allAset.push([bi, e]); });
  const totalAset = allAset.length;
  const asetSize = totalAset * 16;

  const pthsOffset = asetOffset + asetSize;
  const pthsChunks = [];
  const enc = new TextEncoder();
  for (const blk of blocks) { pthsChunks.push(enc.encode(blk.pathString), Uint8Array.of(0)); }
  pthsChunks.push(PTHS_TRAILER, Uint8Array.of(0));
  let pthsLen = 0;
  for (const c of pthsChunks) pthsLen += c.length;

  // DATA: page-aligned blocks from 0x208000.
  const dataOffset = 0x208000;
  const dataPageStart = dataOffset / PAGE_SIZE;
  const layouts = [];
  let currentPage = dataPageStart;
  for (const blk of blocks) {
    const pages = alignUp(blk.compressedData.length, PAGE_SIZE) / PAGE_SIZE;
    layouts.push({ page: currentPage, pages });
    currentPage += pages;
  }
  const fileSize = currentPage * PAGE_SIZE;

  // CSUM meta = resident block's ASET entry count (path ends resident_p000_q3.block).
  let meta = csumMeta;
  if (meta === null) {
    meta = 0;
    for (const blk of blocks) {
      if (blk.pathString.toLowerCase().replace(/\//g, '\\').endsWith('\\resident_p000_q3.block')) {
        meta = blk.asetEntries.length;
        break;
      }
    }
  }

  const out = new Uint8Array(fileSize);

  // FFCS header (256 bytes).
  out[0] = 0x46; out[1] = 0x46; out[2] = 0x43; out[3] = 0x53; // "FFCS"
  putU32(out, 4, 2);
  putU32(out, 8, 7);
  const cr = 0x0c;
  const row = (at, tag, offset, m) => {
    out[at] = tag.charCodeAt(0); out[at + 1] = tag.charCodeAt(1);
    out[at + 2] = tag.charCodeAt(2); out[at + 3] = tag.charCodeAt(3);
    putU32(out, at + 4, offset); putU32(out, at + 8, m);

  row(cr, 'INDX', indxOffset, numBlocks);
  row(cr + 12, 'DATA', dataOffset, 36);
  row(cr + 24, 'CSUM', csumValue, meta);
  row(cr + 36, 'ASET', asetOffset, totalAset);
  row(cr + 48, 'PTHS', pthsOffset, numBlocks);
  out.set(certBlob.subarray(0, 144), 0x48);

  // INDX entries.
  layouts.forEach((L, i) => {
    const off = indxOffset + i * 12;
    putU32(out, off, L.page);
    putU32(out, off + 4, blocks[i].packedField);
    putU32(out, off + 8, ((blocks[i].flags >>> 0) << 16) | L.pages);
  });

  // ASET entries — remap block index into u32_2 high bits, carry the low 16 (the sub) through.
  allAset.forEach(([bi, e], i) => {
    const off = asetOffset + i * 16;
    putU32(out, off, e.assetHash);
    putU32(out, off + 4, e.u32_1);
    putU32(out, off + 8, ((bi >>> 0) << 16) | (e.u32_2 & 0xffff));
    putU32(out, off + 12, e.u32_3);
  });

  // PTHS.
  let p = pthsOffset;
  for (const c of pthsChunks) { out.set(c, p); p += c.length; }

  // DATA.
  layouts.forEach((L, i) => { out.set(blocks[i].compressedData, L.page * PAGE_SIZE); });

  return out;
}

/** Parse an existing patch WAD into blocks (for merge / delete / inspect). */
function readPatchWad(raw) {
  if (raw.length < 0x48 || String.fromCharCode(raw[0], raw[1], raw[2], raw[3]) !== 'FFCS') {
    throw new Error('Not an FFCS WAD');
  }
  const chunks = {};
  for (let i = 0; i < 5; i++) {
    const off = 0x0c + i * 12;
    const tag = String.fromCharCode(raw[off], raw[off + 1], raw[off + 2], raw[off + 3]);
    chunks[tag] = [u32(raw, off + 4), u32(raw, off + 8)];
  }
  if (!chunks.INDX || !chunks.ASET || !chunks.PTHS) throw new Error('missing INDX/ASET/PTHS chunk');
  const [indxOff, indxCount] = chunks.INDX;
  const [asetOff, asetCount] = chunks.ASET;
  const [pthsOff, pthsCount] = chunks.PTHS;
  const csumVal = chunks.CSUM ? chunks.CSUM[0] : 0;

  const indx = [];
  for (let i = 0; i < indxCount; i++) {
    const off = indxOff + i * 12;
    indx.push([u32(raw, off), u32(raw, off + 4), u32(raw, off + 8)]);
  }

  // ASET grouped by block index (u2 high 16 bits).
  const asetByBlock = new Map();
  for (let i = 0; i < asetCount; i++) {
    const off = asetOff + i * 16;
    const u0 = u32(raw, off), u1 = u32(raw, off + 4), u2 = u32(raw, off + 8), u3 = u32(raw, off + 12);
    const bi = (u2 >>> 16) & 0xffff;
    if (!asetByBlock.has(bi)) asetByBlock.set(bi, []);
    asetByBlock.get(bi).push(new AsetEntry(u0, u1, u2, u3));
  }

  // PTHS (null-separated, excluding trailer).
  const paths = [];
  let pos = pthsOff;
  const dec = new TextDecoder();
  for (let i = 0; i < pthsCount; i++) {
    let nul = pos;
    while (nul < raw.length && raw[nul] !== 0) nul++;
    if (nul >= raw.length) break;
    paths.push(dec.decode(raw.subarray(pos, nul)));
    pos = nul + 1;
  }

  const blocks = indx.map(([pageIdx, packed, flagsPages], i) => {
    const pages = flagsPages & 0xffff;
    const flags = (flagsPages >>> 16) & 0xffff;
    const blkOff = pageIdx * PAGE_SIZE;
    const end = Math.min(blkOff + pages * PAGE_SIZE, raw.length);
    // An sges block records its exact byte length (totalC @ +12), so use that authoritative
    // value rather than trimming trailing zeros — a short compressed stream can legitimately
    // END in 0x00 (e.g. a tiny manifest block), which the zero-trim heuristic would corrupt.
    let actualEnd;
    const isSgesBlk = blkOff + 16 <= raw.length &&
      raw[blkOff] === 0x73 && raw[blkOff + 1] === 0x67 && raw[blkOff + 2] === 0x65 && raw[blkOff + 3] === 0x73;
    if (isSgesBlk) {
      const totalC = u32(raw, blkOff + 12);
      actualEnd = totalC > 16 && blkOff + totalC <= end ? blkOff + totalC : end;
    } else {
      actualEnd = end;
      while (actualEnd > blkOff + 4 && raw[actualEnd - 1] === 0) actualEnd--;
      actualEnd = Math.min(alignUp(actualEnd - blkOff, 4) + blkOff, end);
    }
    const b = new PatchBlock(
      raw.slice(blkOff, actualEnd),
      paths[i] !== undefined ? paths[i] : `block_${String(i).padStart(5, '0')}`,
      asetByBlock.get(i) || [],
    );
    b.packedField = packed;
    b.flags = flags;
    return b;
  });

  return { blocks, csumValue: csumVal };
}

/** Read an existing patch WAD and append (or replace-by-path) blocks. */
function mergePatchWads(existing, newBlocks, replace = false) {
  const { blocks, csumValue } = readPatchWad(existing);
  const merged = blocks.slice();
  for (const nb of newBlocks) {
    if (replace) {
      const idx = merged.findIndex((old) => old.pathString === nb.pathString);
      if (idx >= 0) { merged[idx] = nb; continue; }
    }
    merged.push(nb);
  }
  return buildPatchWadMulti(merged, csumValue, null, FFCS_CERT_BLOB);
}


// ===== src/sges.js =====
// sges block compression and decompression.
//
// Faithful port of mercs2_formats::sges. The Rust source states the fidelity contract this
// port inherits verbatim:
//
//   "the deflate bitstream is not byte-identical to Python's zlib — a different deflate
//    implementation packs the same data differently. Correctness is defined by round-trip
//    and engine load, NOT by byte-matching. The container framing (header, table, offsets,
//    flags, alignment) IS byte-faithful."
//
// So the CONTAINER FRAMING here is byte-for-byte the Rust output; the compressed payload is
// valid raw-DEFLATE (via fflate) that decompresses identically. That is the exact standard
// the Rust tool holds itself to — it is not byte-identical to the Python reference either.


const DEFAULT_SEGMENT_SIZE = 65536;
const DEFAULT_LEVEL = 6;

/**
 * Decompress an sges block back to raw bytes.
 *
 * The per-segment u16 compressed-size is unreliable for large/incompressible segments (it
 * can wrap or read 0), so for a COMPRESSED segment we hand the inflater the span from this
 * segment's offset up to the next (capped at 128 KB) and let it consume exactly the deflate
 * stream — the same tactic as the Rust and the original Python.
 */
function decompressSges(block) {
  if (block.length < 16) throw new Error('Block too small for sges header');
  if (String.fromCharCode(block[0], block[1], block[2], block[3]) !== 'sges') {
    throw new Error('Bad sges magic');
  }
  const segCount = u16(block, 6);
  const totalU = u32(block, 8);
  const tableStart = 16;
  if (block.length < tableStart + segCount * 8) throw new Error('Block too small for segment table');

  const segs = [];
  for (let i = 0; i < segCount; i++) {
    const base = tableStart + i * 8;
    const rawU = u16(block, base + 2);
    const flagged = u32(block, base + 4);
    segs.push({
      compSize: u16(block, base),
      uncompSize: rawU === 0 ? DEFAULT_SEGMENT_SIZE : rawU,
      offset: flagged & 0xfffffffe,
      isCompressed: (flagged & 1) !== 0,
    });
  }

  const end = block.length;
  const out = new Uint8Array(totalU);
  let written = 0;
  for (let i = 0; i < segs.length && written < totalU; i++) {
    const seg = segs[i];
    if (seg.offset >= end) break;
    if (seg.isCompressed) {
      const nextOff = i + 1 < segs.length ? segs[i + 1].offset : end;
      const readEnd = Math.min(nextOff, seg.offset + 131072, end);
      if (readEnd <= seg.offset) break;
      let dec;
      try {
        dec = inflateSync(block.subarray(seg.offset, readEnd), { out: new Uint8Array(seg.uncompSize) });
      } catch {
        break; // a corrupt stream stops the block, matching the reference (page count flags truncation)
      }
      out.set(dec.subarray(0, Math.min(dec.length, totalU - written)), written);
      written += Math.min(dec.length, totalU - written);
    } else {
      const actual = seg.compSize > 0 ? seg.compSize : seg.uncompSize;
      const readSz = Math.min(actual, totalU - written);
      const readEnd = Math.min(seg.offset + readSz, end);
      if (readEnd > seg.offset) {
        out.set(block.subarray(seg.offset, readEnd), written);
        written += readEnd - seg.offset;
      }
    }
  }
  return written === totalU ? out : out.subarray(0, written);
}

/**
 * Compress raw block bytes into an sges block. Container framing is byte-faithful to the
 * Rust; the deflate payload is fflate raw-deflate. Round-trips through decompressSges and
 * loads in-engine, which is the whole fidelity requirement.
 */
function compressSges(uncompressed, { segmentSize = DEFAULT_SEGMENT_SIZE, level = DEFAULT_LEVEL, major = 4 } = {}) {
  if (!uncompressed.length) throw new Error('Cannot compress empty data');

  const totalU = uncompressed.length;
  const segments = [];
  for (let off = 0; off < totalU; off += segmentSize) {
    const chunk = uncompressed.subarray(off, Math.min(off + segmentSize, totalU));
    const compressed = deflateSync(chunk, { level });
    // Fall back to raw storage when deflate overflows the u16 comp-size limit or fails to shrink.
    if (compressed.length > 65535 || compressed.length >= chunk.length) {
      segments.push({ stored: chunk, uncompSize: chunk.length, isCompressed: false });
    } else {
      segments.push({ stored: compressed, uncompSize: chunk.length, isCompressed: true });
    }
  }

  const n = segments.length;
  const dataStart = align16(16 + n * 8);

  // Lay out each segment at a 16-byte-aligned offset.
  const segOffsets = [];
  let pos = dataStart;
  for (const seg of segments) {
    segOffsets.push(pos);
    pos = align16(pos + seg.stored.length);
  }
  const lastEnd = segOffsets[n - 1] + segments[n - 1].stored.length;
  const totalC = align16(lastEnd);

  const block = new Uint8Array(totalC);
  block[0] = 0x73; block[1] = 0x67; block[2] = 0x65; block[3] = 0x73; // "sges"
  putU16(block, 4, major);
  putU16(block, 6, n);
  putU32(block, 8, totalU);
  putU32(block, 12, totalC);

  for (let i = 0; i < n; i++) {
    const seg = segments[i];
    const base = 16 + i * 8;
    // comp_sz: full-size raw segments (>65535) overflow u16, so store 0 (= default).
    const compSz = !seg.isCompressed && seg.stored.length > 65535 ? 0 : seg.stored.length;
    // uncomp field: 0 for a full-size segment, actual size for the short last one.
    const uncompField = seg.uncompSize === segmentSize ? 0 : seg.uncompSize;
    putU16(block, base, compSz);
    putU16(block, base + 2, uncompField);
    putU32(block, base + 4, (segOffsets[i] >>> 0) | (seg.isCompressed ? 1 : 0));
    block.set(seg.stored, segOffsets[i]);
  }
  return block;
}

/** Is this a raw (uncompressed) container rather than an sges block? Merge/delete move
 *  blocks verbatim, so they never need to know — but inspection does. */
const isSges = (b) => b.length >= 4 && b[0] === 0x73 && b[1] === 0x67 && b[2] === 0x65 && b[3] === 0x73;
const isUcfx = (b) => b.length >= 4 && b[0] === 0x55 && b[1] === 0x43 && b[2] === 0x46 && b[3] === 0x58;


// ===== src/hash.js =====
// The two hashes the WAD format is built on.
//
// Ported from mercs2_formats::hash and mercs2_formats::crc32. Both are tiny and fully
// deterministic, so this port is byte-exact by construction — verified against the recovered
// bone/name pairs and against the CSUM trailers of real containers.

/** pandemic_hash_m2 — FNV-1a 32-bit, case-folded with `| 0x20`, finalised `^ 0x2A` then one
 *  more multiply by the FNV prime. This is the asset-name hash: every asset in the game is
 *  keyed by it, so a new asset's identity is entirely its name hashed through here.
 *  Case-insensitive by design — "MyMod" and "mymod" collide. */
function pandemicHashM2(text) {
  if (!text.length) return 0;
  let h = 0x811c9dc5 >>> 0;
  for (let i = 0; i < text.length; i++) {
    h = (h ^ (text.charCodeAt(i) | 0x20)) >>> 0;
    h = Math.imul(h, 0x01000193) >>> 0;
  }
  h = (h ^ 0x2a) >>> 0;
  return Math.imul(h, 0x01000193) >>> 0;
}

const CRC_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let k = 0; k < 8; k++) c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
    t[n] = c >>> 0;
  }
  return t;
})();

/** Standard CRC-32 (reflected, 0xEDB88320), final XOR 0xFFFFFFFF — the value a UCFX
 *  container stores in its trailing CSUM chunk. `crc32(bytes[:-8])` reproduces the stored
 *  trailer, which is how a repoint re-signs a container it edited. */
function crc32Mercs2(bytes) {
  let crc = 0xffffffff;
  for (let i = 0; i < bytes.length; i++) crc = (CRC_TABLE[(crc ^ bytes[i]) & 0xff] ^ (crc >>> 8)) >>> 0;
  return (crc ^ 0xffffffff) >>> 0;
}

const hex8 = (n) => '0x' + (n >>> 0).toString(16).toUpperCase().padStart(8, '0');

/** Asset names hash case-insensitively into a flat namespace, so keep them distinctive and
 *  lowercase. Mirrors the skinner's sanitizer. */
function sanitizeAssetName(s) {
  return (String(s || '').toLowerCase().replace(/[^a-z0-9_]+/g, '_').replace(/^_+|_+$/g, '') || 'asset').slice(0, 64);
}


// ===== src/block.js =====
// Block-level operations: mint a new asset block, and read what an existing one contains.
//
// A "block" in a patch WAD is one sges-compressed unit. Inside its decompressed bytes is an
// entry table — `[u32 count][count × 16B (name_hash, type_hash, field_c, chunk_size)]`
// followed by the chunk payloads — so one block can hold several assets. The extra/inject
// blocks this tool mints hold exactly one.


// type_id -> the type-name hash the engine keys asset resolution on (pandemic_hash_m2 of the
// LoadAsset type string). Ported from mercs2_smuggler::type_hash_for_type_id.
const TYPE = {
  19: { hash: 0x5b724250, label: 'model' },
  23: { hash: 0xfe0e8320, label: 'ui movie' },
  27: { hash: 0xf011157a, label: 'texture' },
  35: { hash: 0x42498680, label: 'script' },

const typeLabel = (hash) => {
  for (const id in TYPE) if (TYPE[id].hash === (hash >>> 0)) return TYPE[id].label;
  return null;
};

/** `[u32 count][count × 16B]` entry table at the head of a decompressed block. */
function parseBlockEntryTable(decompressed) {
  if (decompressed.length < 4) return { count: 0, entries: [] };
  const count = u32(decompressed, 0);
  const entries = [];
  for (let i = 0; i < count; i++) {
    const base = 4 + i * 16;
    if (base + 16 > decompressed.length) break;
    entries.push({
      nameHash: u32(decompressed, base),
      typeHash: u32(decompressed, base + 4),
      fieldC: u32(decompressed, base + 8),
      chunkSize: u32(decompressed, base + 12),
    });
  }
  return { count, entries };
}

/**
 * Mint a NEW single-asset block from a raw UCFX container, exactly as
 * mercs2_smuggler's `build_extra`: a block is
 *   [u32 1][name_hash][type_hash][field_c=0][container_len][container...]
 * compressed with sges, carrying one ASET row (`u32_2 = 0x0000FFFF` = no sub block).
 *
 * @param {Uint8Array} container  a UCFX container (a .ucfx from an export bundle, or an
 *                                encoded texture)
 * @param {number} hash           the new asset's name hash
 * @param {number} typeId         19 model / 27 texture / 35 script
 * @returns {PatchBlock}

function makeExtraBlock(container, hash, typeId, pathHint) {
  const t = TYPE[typeId];
  if (!t) throw new Error(`unsupported type_id ${typeId} (need 19 model / 23 ui movie / 27 texture / 35 script)`);
  if (!isUcfx(container)) throw new Error('not a UCFX container (must start with the UCFX magic)');

  const inner = new Uint8Array(20 + container.length);
  const dv = new DataView(inner.buffer);
  dv.setUint32(0, 1, true);
  dv.setUint32(4, hash >>> 0, true);
  dv.setUint32(8, t.hash >>> 0, true);
  dv.setUint32(12, 0, true); // field_c
  dv.setUint32(16, container.length, true);
  inner.set(container, 20);

  const pages = Math.ceil(inner.length / 0x8000);
  const block = new PatchBlock(
    compressSges(inner),
    pathHint || `blocks\\VZ\\inject_${hex8(hash).slice(2).toLowerCase()}.block`,
    [new AsetEntry(hash, 0xffffffff, 0x0000ffff, typeId)],
  );
  block.packedField = pages;
  return block;
}

/**
 * Describe a block for the UI: its assets, their types, and its decompressed size.
 *
 * Decompression is only for the summary; merge/delete never touch it. `deep=false` reads
 * just enough to get the entry table (cheap on a many-MB block).
 */
function describeBlock(block, { deep = false } = {}) {
  const data = block.compressedData;

  try {
    if (isSges(data)) { kind = 'sges'; decomp = decompressSges(data); }
    else if (isUcfx(data)) { kind = 'ucfx'; decomp = data; }
    else decomp = data;
  } catch {
    decomp = null;
  }

  const info = {
    path: block.pathString,
    kind,
    compressedBytes: data.length,
    decompressedBytes: decomp ? decomp.length : null,
    asetHashes: block.asetEntries.map((e) => ({
      hash: hex8(e.assetHash),
      hashNum: e.assetHash >>> 0,
      sub: (e.u32_2 & 0xffff) === 0xffff ? null : (e.u32_2 & 0xffff),
      typeId: e.u32_3,
      typeLabel: TYPE[e.u32_3] ? TYPE[e.u32_3].label : String(e.u32_3),
    })),
    assets: [],
  };

  if (decomp && (deep || info.asetHashes.length === 0)) {
    const { entries } = parseBlockEntryTable(decomp);
    info.assets = entries.map((e) => ({
      hash: hex8(e.nameHash),
      type: typeLabel(e.typeHash) || hex8(e.typeHash),
      chunkBytes: e.chunkSize,
    }));
  }
  return info;
}


// ===== src/gfx.js =====
// Scaleform movie (.gfx/.cfx) packing — lets GFXForge users ship UI mods.
//
// A movie asset in the WAD is the movie file wrapped in the simplest possible UCFX
// container: a fixed 40-byte header (UCFX magic, data area at 0x28, ONE `data`
// descriptor whose body_size is the movie length), the movie bytes, then a CSUM
// trailer. That container sits in a normal single-entry block with type_hash
// 0xFE0E8320 (type_id 23). Byte-identical to the community gfx_tool's known-good
// containers and to the modkit's cfx_pack fix (verified against both).

const MOVIE_TYPE_ID = 23;
const MOVIE_TYPE_HASH = 0xfe0e8320;

/** Identify a Scaleform/SWF movie by magic. Returns {kind, version} or null. */
function sniffMovie(bytes) {
  if (!bytes || bytes.length < 8) return null;
  const magic = String.fromCharCode(bytes[0], bytes[1], bytes[2]);
  if (magic === 'GFX' || magic === 'CFX' || magic === 'FWS' || magic === 'CWS') {
    return { kind: magic, version: bytes[3] };
  }
  return null;
}

/** Wrap a bare movie file in the canonical single-`data` UCFX container (+CSUM). */
function wrapMovieContainer(movie) {
  const header = new Uint8Array([
    0x55, 0x43, 0x46, 0x58, 0x28, 0x00, 0x00, 0x00, // 'UCFX', data_area_off=0x28
    0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
    0x01, 0x00, 0x00, 0x00, 0x64, 0x61, 0x74, 0x61, // n_desc=1, 'data'
    0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, // offset=0, body_size (patched)
    0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
  ]);
  new DataView(header.buffer).setUint32(28, movie.length, true);
  const body = new Uint8Array(header.length + movie.length + 8);
  body.set(header, 0);
  body.set(movie, header.length);
  const crc = crc32Mercs2(body.subarray(0, header.length + movie.length));
  body.set([0x43, 0x53, 0x55, 0x4d], header.length + movie.length); // 'CSUM'
  new DataView(body.buffer).setUint32(header.length + movie.length + 4, crc, true);
  return body;
}

/**
 * Build a patch block that ships a movie under `name` — override an existing game
 * movie by using its exact name (e.g. "AllCon001_briefing"), or pick a new name and
 * load it from Lua via SetSwfFile("<name>.gfx").
 */
function makeMovieBlock(movie, name) {
  if (!sniffMovie(movie)) {
    throw new Error('not a Scaleform/SWF movie (no GFX/CFX/FWS/CWS magic) — export a .gfx from GFXForge');
  }
  const clean = String(name || '').trim().replace(/\.(gfx|cfx|swf)$/i, '');
  if (!clean) throw new Error('the movie needs a name (the game movie to replace, or a new name)');
  const hash = pandemicHashM2(clean);
  const container = wrapMovieContainer(movie);
  const block = makeExtraBlock(container, hash, MOVIE_TYPE_ID,
    `blocks\\VZ\\gfx_${hex8(hash).slice(2).toLowerCase()}.block`);
  return { block, hash, name: clean };
}


// ===== src/mods.js =====
// The mod layer: beginners install MODS, not blocks.
//
// A mod manifest is a tiny JSON (name/author/version/description + the block paths it
// owns) carried INSIDE the patch WAD as a zero-entry block: `[u32 0][json bytes]`,
// sges-compressed, with NO ASET rows. The engine's loader only ever visits blocks that
// an ASET row points at, and a zero-entry table consumes nothing anyway, so the block
// is inert in-game — but any tool can read it back and show "Jen outfit (12 blocks)"
// instead of raw hex. Convention spec: docs/mod-manifest.md.

const MANIFEST_PATH_PREFIX = 'blocks\\VZ\\mod.';
const MANIFEST_PATH_SUFFIX = '.manifest.block';

function manifestPath(slug) {
  const clean = String(slug || 'mod').toLowerCase().replace(/[^a-z0-9_-]+/g, '-').replace(/^-+|-+$/g, '') || 'mod';
  return `${MANIFEST_PATH_PREFIX}${clean}${MANIFEST_PATH_SUFFIX}`;
}

/** Normalize + validate a manifest object. Throws with a beginner-readable message. */
function normalizeManifest(m) {
  if (!m || typeof m !== 'object') throw new Error('manifest must be a JSON object');
  const name = String(m.name || '').trim();
  if (!name) throw new Error('manifest needs a "name"');
  return {
    name,
    author: m.author ? String(m.author).trim() : null,
    version: m.version ? String(m.version).trim() : null,
    description: m.description ? String(m.description).trim() : null,
    blocks: Array.isArray(m.blocks) ? m.blocks.map(String) : [],
  };
}

/** Build the zero-entry manifest block for a mod. */
function makeManifestBlock(manifest) {
  const man = normalizeManifest(manifest);
  const json = new TextEncoder().encode(JSON.stringify(man));
  const inner = new Uint8Array(4 + json.length);
  putU32(inner, 0, 0); // entry_count = 0 -> the engine consumes nothing
  inner.set(json, 4);
  const block = new PatchBlock(compressSges(inner), manifestPath(man.name), []);
  block.packedField = Math.ceil(inner.length / 0x8000);
  return block;
}

/** If this block is a manifest block, parse it; else null. */
function readManifestBlock(block) {
  const p = block.pathString || '';
  if (!p.startsWith(MANIFEST_PATH_PREFIX) || !p.endsWith(MANIFEST_PATH_SUFFIX)) return null;
  try {
    const d = isSges(block.compressedData) ? decompressSges(block.compressedData) : block.compressedData;
    if (u32(d, 0) !== 0) return null;
    return normalizeManifest(JSON.parse(new TextDecoder().decode(d.subarray(4))));
  } catch {
    return null;
  }
}

/**
 * Group a patch's blocks into mods. Manifest blocks claim their listed paths;
 * everything unclaimed lands in one "other" group. Returns
 * [{ name, author, version, description, indices, manifestIndex|null }].
 */
function groupBlocks(blocks) {
  const groups = [];
  const claimed = new Set();
  blocks.forEach((b, i) => {
    const man = readManifestBlock(b);
    if (!man) return;
    claimed.add(i);
    const indices = [];
    const want = new Set(man.blocks.map((s) => s.toLowerCase()));
    blocks.forEach((ob, oi) => {
      if (oi !== i && want.has((ob.pathString || '').toLowerCase())) {
        indices.push(oi);
        claimed.add(oi);
      }
    });
    groups.push({ ...man, indices, manifestIndex: i });
  });
  const rest = blocks.map((_, i) => i).filter((i) => !claimed.has(i));
  if (rest.length) {
    groups.push({ name: null, author: null, version: null, description: null, indices: rest, manifestIndex: null });
  }
  return groups;
}


// ===== src/wad.js =====
// A patch WAD you can manage: the add / merge / delete verbs the UI drives.
//
// Everything here is a thin, honest wrapper over patch_wad.js. The one rule it enforces that
// the low-level writer does not is the `sub`-index correction: a block's `sub` field is an
// ABSOLUTE block index, and the writer only rewrites the high half of the ASET record, so
// appending blocks ahead of a sub-referencing block would leave it pointing at the wrong
// place. readPatchWad already re-groups ASET rows by block, so a block loaded from an
// existing WAD keeps its OWN sub relative to the merged layout — the danger is only when
// ADDING a new multi-block asset, which addAsset handles explicitly.


class WadDoc {
  /** @param {{blocks: PatchBlock[], csumValue: number}} contents */
  constructor(contents) {
    this.blocks = contents.blocks;
    this.csumValue = contents.csumValue;
  }

  /** Empty patch, or parse existing bytes. */
  static empty() { return new WadDoc({ blocks: [], csumValue: 0 }); }
  static fromBytes(raw) { return new WadDoc(readPatchWad(raw)); }

  /** Serialize back to WAD bytes. Byte-faithful framing; see sges.js on the payload. */
  toBytes() {
    return buildPatchWadMulti(this.blocks, this.csumValue, null, FFCS_CERT_BLOB);
  }

  list() {
    return this.blocks.map((b, i) => ({ index: i, ...describeBlock(b) }));
  }

  /** Every asset hash this WAD publishes, and which block owns it — for collision checks. */
  assetIndex() {
    const map = new Map();
    this.blocks.forEach((b, bi) => {
      for (const e of b.asetEntries) map.set(e.assetHash >>> 0, { block: bi, typeId: e.u32_3 });
    });
    return map;
  }

  /**
   * Add a single-asset block from a UCFX container under a NEW name.
   *
   * @param {{name?, hash?, typeId, container: Uint8Array, sub?: PatchBlock}} o
   *   sub — an optional finer-LOD block to ship alongside (the two-block vehicle/character
   *   case). When present, the primary's ASET row is pointed at it and it is appended with
   *   no ASET row of its own, matching how the base game stores finer rungs.
   * @returns {{hash, index, warnings: string[]}}
   */
  addAsset({ name, hash, typeId, container, sub = null }) {
    const h = hash !== undefined ? (hash >>> 0) : pandemicHashM2(name);
    if (!TYPE[typeId]) throw new Error(`unsupported type_id ${typeId}`);
    const warnings = [];

    const existing = this.assetIndex();
    if (existing.has(h)) {
      warnings.push(`0x${h.toString(16).toUpperCase()} already exists in this WAD (block ${existing.get(h).block}); it will be shadowed by load order, not replaced. Rename to avoid ambiguity.`);
    }

    const primary = makeExtraBlock(container, h, typeId,
      name ? `blocks\\VZ\\${name}_P000.block` : undefined);

    if (sub) {
      // The sub block is added FIRST so its index is known, then referenced. Its own ASET
      // rows are dropped: a finer rung is reached only through the parent's sub.
      const subIndex = this.blocks.length + 1; // primary goes at length, sub right after
      primary.asetEntries[0] = new AsetEntry(h, 0xffffffff, subIndex & 0xffff, typeId);
      const subBlock = new PatchBlock(sub.compressedData,
        name ? `blocks\\VZ\\${name}_P001.block` : `blocks\\VZ\\sub_${hex8(h).slice(2).toLowerCase()}.block`,
        []);
      subBlock.packedField = sub.packedField;
      this.blocks.push(primary, subBlock);
      return { hash: h, index: this.blocks.length - 2, warnings };
    }

    this.blocks.push(primary);
    return { hash: h, index: this.blocks.length - 1, warnings };
  }

  /** Add an already-framed PatchBlock (e.g. one carved out of another WAD). */
  addBlock(block) {
    this.blocks.push(block);
    return { index: this.blocks.length - 1 };
  }

  /**
   * Add a Scaleform UI movie (.gfx/.cfx from GFXForge) under `name` — override an existing
   * game movie by its exact name, or a new name loaded via SetSwfFile("<name>.gfx").
   * @returns {{hash, index, warnings: string[]}}
   */
  addMovie({ movie, name }) {
    const { block, hash } = makeMovieBlock(movie, name);
    const warnings = [];
    const existing = this.assetIndex();
    if (existing.has(hash >>> 0)) {
      warnings.push(`0x${(hash >>> 0).toString(16).toUpperCase()} already exists in this WAD (block ${existing.get(hash >>> 0).block}); load order decides which wins.`);
    }
    this.blocks.push(block);
    return { hash, index: this.blocks.length - 1, warnings };
  }

  /** The mods in this patch, grouped from manifest blocks (unclaimed blocks → one "other"). */
  mods() {
    return groupBlocks(this.blocks);
  }

  /**
   * Stamp this patch with a mod manifest so tools show it as one named mod. Replaces any
   * existing manifest block. `blocks` defaults to every non-manifest block currently present.
   */
  tagMod(manifest) {
    const isManifest = (b) => {
      const p = b.pathString || '';
      return p.startsWith(MANIFEST_PATH_PREFIX) && p.endsWith(MANIFEST_PATH_SUFFIX);
    };
    this.blocks = this.blocks.filter((b) => !isManifest(b));
    const paths = (manifest.blocks && manifest.blocks.length)
      ? manifest.blocks
      : this.blocks.map((b) => b.pathString);
    this.blocks.push(makeManifestBlock({ ...manifest, blocks: paths }));
    return { blocks: paths.length };
  }

  /**
   * Merge another patch WAD's blocks in.
   *
   * @param {Uint8Array} otherBytes
   * @param {{replace?: boolean}} opts  replace matches by path, else append
   * @returns {{added: number, replaced: number, warnings: string[]}}
   */
  merge(otherBytes, { replace = false } = {}) {
    const other = readPatchWad(otherBytes);
    const warnings = [];
    const mineByHash = this.assetIndex();
    let added = 0, replaced = 0;

    for (const nb of other.blocks) {
      // Collision surfacing: a merged block that publishes a hash we already have.
      for (const e of nb.asetEntries) {
        if (mineByHash.has(e.assetHash >>> 0)) {
          warnings.push(`Both WADs publish ${hex8(e.assetHash)} — after merge, load order decides which wins.`);
        }
      }
      if (replace) {
        const idx = this.blocks.findIndex((old) => old.pathString === nb.pathString);
        if (idx >= 0) { this.blocks[idx] = nb; replaced++; continue; }
      }
      this.blocks.push(nb);
      added++;
    }
    return { added, replaced, warnings };
  }

  /** Remove a block by index. Returns the removed block's summary, or null. */
  deleteBlock(index) {
    if (index < 0 || index >= this.blocks.length) return null;
    const [removed] = this.blocks.splice(index, 1);
    // A block that some other block's `sub` pointed at is now gone. Flag it rather than
    // silently producing a WAD that references a missing rung.
    const orphaned = [];
    this.blocks.forEach((b, bi) => {
      for (const e of b.asetEntries) {
        const sub = e.u32_2 & 0xffff;
        if (sub !== 0xffff && sub === index) orphaned.push(hex8(e.assetHash));
      }
    });
    return { removed: describeBlock(removed), orphaned };
  }

  /** Remove every block that publishes `hash` (and warn if it leaves a dangling sub). */
  deleteAsset(hash) {
    const h = hash >>> 0;
    const idx = this.blocks.findIndex((b) => b.asetEntries.some((e) => (e.assetHash >>> 0) === h));
    if (idx < 0) return null;
    return this.deleteBlock(idx);
  }
}


// ===== src/skinner_import.js =====
// Read a skinner "-assets.zip" and turn it into ready-to-pack blocks.
//
// The skinner's new-asset export is a zip of:
//   <model>.ucfx            the model container (type 19)
//   <model>_<part>.ucfx     one texture container each (type 27)
//   install.bat             the packing recipe
//
// install.bat is the AUTHORITATIVE manifest: it carries the exact
// `--inject-extra <HASH>:<TYPEID>:"...<file>"` line per asset. Parsing it means we never
// have to guess a hash or a type from a filename — we use precisely what the skinner
// intended, so a WAD packed here is identical in identity to one packed by the smuggler the
// .bat would have called. This is the whole point of the "pack a skinner export" path: the
// zip already knows everything; the tool just does what the .bat says without a shell.


const basename = (p) => p.replace(/\\/g, '/').split('/').pop();

/** Strip a `.bat`/`.sh` path expression down to a bare filename: drops a surrounding quote,
 *  a `%~dp0` / `$(dirname …)` prefix, and any directory part. */
function cleanFilename(raw) {
  let f = raw.trim().replace(/^["']|["']$/g, '');
  // %~dp0 is `%~` + modifier letters + the arg digit. Match exactly that, or `[a-z]+` would
  // greedily eat into the filename (%~dp0merc… -> stripped to _test…).
  f = f.replace(/^%~[a-z]+\d/i, '');
  f = f.replace(/^\$\{?[^}\s/]*\}?\//, '');     // ${DIR}/ or $DIR/
  return basename(f);
}

/** Pull the `--inject-extra HASH:TYPEID:file` lines out of an install.bat / .sh. */
function parseInstallScript(text) {
  const out = [];
  // The file field runs from the third colon to `.ucfx`, and may carry a quote and a
  // %~dp0-style prefix — captured whole here, cleaned to a basename by cleanFilename.
  const re = /--inject-extra\s+(0x[0-9a-fA-F]+)\s*:\s*(\d+)\s*:\s*("?[^"\n]*?\.ucfx"?)/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    out.push({ hash: parseInt(m[1], 16) >>> 0, typeId: Number(m[2]), file: cleanFilename(m[3]) });
  }
  return out;
}

/**
 * @param {Uint8Array} zipBytes
 * @returns {{assets: Array<{name, hash, typeId, file, container}>, source: string, warnings: string[]}}
 */
function parseSkinnerZip(zipBytes) {
  let files;
  try {
    files = unzipSync(zipBytes);
  } catch (e) {
    throw new Error(`Could not read the zip: ${e.message}`);
  }

  // index every entry by basename (skinner zips are flat, but be forgiving)
  const byBase = new Map();
  const ucfxNames = [];
  for (const path of Object.keys(files)) {
    const b = basename(path);
    byBase.set(b.toLowerCase(), files[path]);
    if (/\.ucfx$/i.test(b)) ucfxNames.push(b);
  }
  if (!ucfxNames.length) {
    throw new Error('No .ucfx containers in this zip. Is it a skinner "new asset" export? '
      + '(The modkit export has PNGs and a mod.json instead — that route packs itself.)');
  }

  const warnings = [];

  // Prefer the install script: it is the authoritative hash/type map.
  const scriptName = Object.keys(files).map(basename)
    .find((n) => /^install\.(bat|sh)$|^build\.(bat|sh)$/i.test(n));
  const recipe = scriptName
    ? parseInstallScript(new TextDecoder().decode(byBase.get(scriptName.toLowerCase())))
    : [];

  const assets = [];
  const used = new Set();

  for (const r of recipe) {
    const container = byBase.get(r.file.toLowerCase());
    if (!container) {
      warnings.push(`${r.file} is named in install.bat but not present in the zip — skipped.`);
      continue;
    }
    if (!isUcfx(container)) {
      warnings.push(`${r.file} is not a UCFX container — skipped.`);
      continue;
    }
    if (!TYPE[r.typeId]) {
      warnings.push(`${r.file} has an unknown type ${r.typeId} — skipped.`);
      continue;
    }
    used.add(r.file.toLowerCase());
    assets.push({ name: r.file.replace(/\.ucfx$/i, ''), hash: r.hash, typeId: r.typeId, file: r.file, container });
  }

  // Any .ucfx the script did not mention: fall back to inferring from the filename. The
  // skinner names each file after its asset, so the hash is the name hashed; the type is
  // guessed from the naming convention (a bare model name = model, a suffixed one = texture).
  for (const name of ucfxNames) {
    if (used.has(name.toLowerCase())) continue;
    const base = name.replace(/\.ucfx$/i, '');
    const container = byBase.get(name.toLowerCase());
    if (!isUcfx(container)) continue;
    // `_nm`/`_sm`/`_dm` or any `_part` suffix ⇒ texture; otherwise assume a model.
    const looksTexture = /_(ub|lb|head|hair|eyes|body|dm|nm|sm|[a-z]+)$/i.test(base) && base.includes('_');
    const typeId = looksTexture ? 27 : 19;
    warnings.push(`${name} was not in install.bat; guessed ${TYPE[typeId].label} from its name.`);
    assets.push({ name: base, hash: pandemicHashM2(base) >>> 0, typeId, file: name, container });
  }

  if (!assets.length) throw new Error('The zip had .ucfx files but none could be resolved to an asset.');

  return { assets, source: scriptName ? `install script (${scriptName})` : 'filenames', warnings };
}

/** Turn parsed assets into blocks ready to append. Model first, so a viewer reads it first. */
function assetsToBlocks(assets) {
  const order = [...assets].sort((a, b) => (a.typeId === 19 ? 0 : 1) - (b.typeId === 19 ? 0 : 1));
  return order.map((a) => ({
    asset: a,
    block: makeExtraBlock(a.container, a.hash, a.typeId, `blocks\\VZ\\${a.name}.block`),
  }));
}


// ===== src/data/reference.js =====
// GENERATED by bake_reference.py — reference data for beginner-friendly labeling.
// Ships ONLY name strings + a hash-membership fingerprint. No game art or geometry.
// names: deflate(raw)+base64 newline-joined list of VERIFIED asset names
//        (pandemicHashM2(name) is a real base-WAD ASET hash in vz.wad/shell.wad).

// ===== src/labels.js =====
// Beginner-facing identification: what a block IS, in plain language.
//
// Three layers, all offline:
//  - TYPE_INFO: every ASET type_id we can identify, with a short human label + blurb.
//  - hashName(): reverse the asset hash to a real name, from a bundled dictionary of
//    VERIFIED names (each one hashes to an actual base-WAD ASET hash; strings only).
//  - inBaseGame(): membership test against a bloom fingerprint of every base ASET hash
//    (vz.wad + shell.wad) — this is what tells "🔁 replaces a game asset" apart from
//    "✨ adds something brand-new". ~2% false-positive, zero false-negative.

/** type_id -> friendly label + one-line blurb. `mint` = this tool can create one. */
const TYPE_INFO = {
  19: { label: 'Model',      blurb: '3D shape (a vehicle, prop, character…)', mint: true },
  27: { label: 'Texture',    blurb: 'image — what things look like',          mint: true },
  35: { label: 'Script',     blurb: 'Lua code the game runs',                 mint: true },
  23: { label: 'UI movie',   blurb: 'Scaleform menu/HUD art (.gfx)',          mint: true },
  9:  { label: 'Layer',      blurb: 'a set of world placements the game streams in' },
  16: { label: 'Animation',  blurb: 'movement data' },
  5:  { label: 'FaceFX',     blurb: 'facial animation set' },
  6:  { label: 'Wave bank',  blurb: 'sound effect audio data' },
  21: { label: 'Sound bank', blurb: 'sound cue definitions' },
  13: { label: 'Sound DB',   blurb: 'sound lookup table' },
  7:  { label: 'String DB',  blurb: 'text the game displays' },
  11: { label: 'Anim table', blurb: 'animation lookup table' },
  8:  { label: 'World entity', blurb: 'spawnable template definitions' },
  10: { label: 'Guid map',   blurb: 'name-to-id directory' },
  20: { label: 'Level',      blurb: 'level definition' },
  15: { label: 'Font',       blurb: 'typeface' },
  29: { label: 'Effect',     blurb: 'particle/visual effect' },
  14: { label: 'Material',   blurb: 'surface parameters' },
};

const typeInfo = (typeId) =>
  TYPE_INFO[typeId] || { label: `type ${typeId}`, blurb: 'an asset type this tool has no notes on' };

function b64ToBytes(b64) {
  if (typeof atob === 'function') {
    const s = atob(b64);
    const out = new Uint8Array(s.length);
    for (let i = 0; i < s.length; i++) out[i] = s.charCodeAt(i);
    return out;
  }
  return new Uint8Array(Buffer.from(b64, 'base64'));
}

let nameMap = null;
function initNames() {
  if (nameMap) return;
  nameMap = new Map();
  const txt = new TextDecoder().decode(inflateSync(b64ToBytes(NAMES_DEFLATE_B64)));
  for (const n of txt.split('\n')) if (n) nameMap.set(pandemicHashM2(n) >>> 0, n);
}

/** Real asset name for a hash, if the bundled dictionary knows it. */
function hashName(hash) {
  initNames();
  return nameMap.get(hash >>> 0) || null;
}

let bloomBits = null;
/** Is this hash an asset that exists in the BASE game (vz.wad/shell.wad)? ~2% FP. */
function inBaseGame(hash) {
  if (!bloomBits) bloomBits = b64ToBytes(BLOOM_B64);
  const g1 = hash >>> 0;
  const g2 = ((Math.imul(g1, 0x9e3779b9) >>> 0) | 1) >>> 0;
  for (let i = 0; i < BLOOM_K; i++) {
    const idx = (g1 + i * g2) % BLOOM_M;
    if (!((bloomBits[idx >> 3] >> (idx & 7)) & 1)) return false;
  }
  return true;
}

/**
 * Everything the UI needs to explain one asset row:
 * name (if known), type label/blurb, and the override/new verdict sentence.
 */
function describeAsset(hash, typeId) {
  const t = typeInfo(typeId);
  const name = hashName(hash);
  const base = inBaseGame(hash);
  const sentence = base
    ? `replaces ${name ? `the game's “${name}”` : 'an asset that exists in the base game'}`
    : 'adds a brand-new asset the base game does not have';
  return { name, typeLabel: t.label, blurb: t.blurb, mintable: !!t.mint, inBase: base, verdict: base ? 'override' : 'new', sentence };
}


// ===== src/ui/app.js =====
// wad-simulator-js UI.
//
// A patch WAD is otherwise a 100 MB binary blob nobody can see inside. This opens one, shows
// every block and the assets it publishes, and lets you add / merge / delete — then hands
// back a WAD the game loads. The whole engine is the byte-faithful port in src/; this file
// is only wiring.
//
// It keeps the skinner's shape on purpose: a card to choose what you're doing, one guided
// panel at a time, and a verdict after anything you drop, so "did it work?" is answered where
// you're looking instead of being inferred from silence.


const S = { doc: null, name: 'my-patch.wad' };

function boot() {
  renderStart();
}

// ---------------------------------------------------------------- start
function renderStart() {
  const root = $('#app');
  root.innerHTML = '';
  root.appendChild(el('div', 'lead',
    'Open a patch WAD to see and change what is inside it, or start an empty one. '
    + 'Everything happens in your browser — nothing is uploaded.'));

  const cards = el('div', 'cards');

  const openCard = el('button', 'card');
  openCard.appendChild(el('div', 'card-icon', '📂'));
  openCard.appendChild(el('div', 'card-t', 'Open a WAD'));
  openCard.appendChild(el('div', 'card-s', 'Drop an existing vz-patch.wad to inspect, add to, or trim it.'));
  const openInput = el('input');
  openInput.type = 'file';
  openInput.accept = '.wad';
  openInput.style.display = 'none';
  openCard.appendChild(openInput);
  openCard.addEventListener('click', () => openInput.click());
  openInput.addEventListener('change', (e) => { if (e.target.files[0]) openWad(e.target.files[0]); });
  cards.appendChild(openCard);

  const packCard = el('button', 'card feature');
  packCard.appendChild(el('div', 'card-icon', '🎨'));
  packCard.appendChild(el('div', 'card-t', 'Pack a skinner export'));
  packCard.appendChild(el('div', 'card-s', 'Drop the .zip the skinner gave you and get a ready-to-install WAD. No command line.'));
  packCard.addEventListener('click', () => renderPack());
  cards.appendChild(packCard);

  const gfxCard = el('button', 'card');
  gfxCard.appendChild(el('div', 'card-icon', '🎬'));
  gfxCard.appendChild(el('div', 'card-t', 'Pack a UI movie'));
  gfxCard.appendChild(el('div', 'card-s', 'Made a menu/HUD in GFXForge? Drop its .gfx and get an installable WAD.'));
  const gfxInput = el('input');
  gfxInput.type = 'file'; gfxInput.accept = '.gfx,.cfx,.swf'; gfxInput.style.display = 'none';
  gfxCard.appendChild(gfxInput);
  gfxCard.addEventListener('click', () => gfxInput.click());

  newCard.appendChild(el('div', 'card-t', 'Start empty'));

  newCard.addEventListener('click', () => { S.doc = WadDoc.empty(); S.name = 'my-patch.wad'; renderManager(); });

  root.appendChild(cards);

    + 'never changes the base game. This tool reads and writes them; it does not make skins. '
    + 'For that, use the skinner and bring its output here to pack.'));
}

async function openWad(file) {
  const root = $('#app');
  try {
    const bytes = await readFileBytes(file);
    S.doc = WadDoc.fromBytes(bytes);
    S.name = file.name || 'patch.wad';
    renderManager();
  } catch (e) {
    const box = el('div');
    box.appendChild(verdict({
      ok: false, title: 'That is not a patch WAD',
      lines: [{ k: 'file', v: file.name, ok: false }, { k: 'reason', v: e.message }],
      hint: 'A patch WAD starts with the bytes "FFCS". This looks like something else — '
        + 'a base vz.wad, a texture, or an unrelated file.',
    }));
    root.appendChild(box);
  }
}

// ---------------------------------------------------------------- pack a skinner export
// The guided path. A skinner "-assets.zip" already contains everything — the model, the
// textures, and an install.bat that says exactly what each asset is called and what type it
// is. This walks it in one rail: drop it (or try the sample), see what's inside, pick where
// it goes, and out comes a WAD the game loads. The install.bat the zip carries would have
// run mercs2_smuggler; this does the same packing with no shell and no download of a tool.
function renderPack() {
  const root = $('#app');
  root.innerHTML = '';
  root.appendChild(el('div', 'lead',
    'The skinner\'s "new asset" export is a .zip. Drop it here and this packs it into a '
    + 'patch WAD for you — the same result its install.bat would produce, without a command line.'));

  const railRoot = el('div');
  root.appendChild(railRoot);
  const back = el('button', 'btn ghost', '← Back');
  back.style.marginTop = '14px';
  back.addEventListener('click', renderStart);
  root.appendChild(back);

  const P = { parsed: null };
  const rail = new Rail(railRoot);

  rail.add('drop', 'Drop your skinner export', (body) => {
    body.appendChild(el('p', null,
      'The file the skinner downloaded, named something like my_skin-assets.zip. It holds '
      + 'the model, the textures and an install.bat — you do not need to unzip it.'));

    const zone = el('label', 'drop');
    zone.appendChild(el('b', null, 'Drop the -assets.zip'));
    zone.appendChild(el('span', 'hint', 'or click to choose it'));
    const input = el('input');
    input.type = 'file';
    input.accept = '.zip';
    zone.appendChild(input);
    wireDrop(zone, input, (files) => { if (files[0]) tryZip(files[0]); });
    body.appendChild(zone);

    const sampleRow = el('div', 'sample-row');
    sampleRow.appendChild(el('span', 'dim', 'Never done this? '));
    const sample = el('button', 'btn ghost', 'Try a ready-made example');
    sample.addEventListener('click', () => loadSample(sample));
    sampleRow.appendChild(sample);
    sampleRow.appendChild(el('div', 'note',
      'A small synthetic texture — no game art — packaged like a skinner export. Pack it and '
      + 'watch the whole flow work before you make your own.'));
    body.appendChild(sampleRow);

    const out = el('div');
    out.id = 'pack-out';
    body.appendChild(out);

    async function tryZip(file) {
      out.innerHTML = '';
      let bytes;
      try { bytes = await readFileBytes(file); } catch (e) { return; }
      handleZipBytes(bytes, file.name, out);
    }
    async function loadSample(btn) {
      btn.disabled = true; btn.textContent = 'loading…';
      out.innerHTML = '';
      try {
        const bytes = await fetchSample();
        handleZipBytes(bytes, 'demo-texture-assets.zip', out);
      } catch (e) {
        out.appendChild(verdict({
          ok: false, title: 'Sample unavailable',
          lines: [{ k: 'reason', v: e.message, ok: false }],
          hint: 'The offline single-file build does not carry the sample. Use the hosted '
            + 'version for the example, or drop your own export.',
        }));
      }
      btn.disabled = false; btn.textContent = 'Try a ready-made example';
    }
    function handleZipBytes(bytes, fname, out) {
      try {
        P.parsed = parseSkinnerZip(bytes);
      } catch (e) {
        return out.appendChild(verdict({
          ok: false, title: 'That is not a skinner export',
          lines: [{ k: 'file', v: fname, ok: false }, { k: 'reason', v: e.message }],
          hint: 'Drop the -assets.zip from the skinner\'s "new asset" export. The modkit '
            + 'export (PNGs + mod.json) packs itself and does not come here.',
        }));
      }
      P.name = sanitizeAssetName(fname.replace(/-assets\.zip$/i, '').replace(/\.zip$/i, '')) || 'my_skin';
      const models = P.parsed.assets.filter((a) => a.typeId === 19);
      const texes = P.parsed.assets.filter((a) => a.typeId === 27);
      out.appendChild(verdict({
        ok: true,
        title: `Read ${P.parsed.assets.length} asset${P.parsed.assets.length === 1 ? '' : 's'} from ${fname}`,
        lines: [
          { k: 'models', v: models.map((a) => `${a.name} ${hex8(a.hash)}`).join(', ') || 'none' },
          { k: 'textures', v: texes.map((a) => a.name).join(', ') || 'none' },
          { k: 'read from', v: P.parsed.source },
        ],
        hint: P.parsed.warnings.length ? P.parsed.warnings.join(' ') : undefined,
      }));
      const act = el('div', 'step-actions');
      const go = el('button', 'btn', 'Use these →');
      go.addEventListener('click', () => rail.complete('drop'));
      act.appendChild(go);
      out.appendChild(act);
    }
  }, () => (P.parsed ? `${P.parsed.assets.length} assets` : ''));

  rail.add('target', 'Where should it go?', (body) => {
    body.appendChild(el('p', null,
      'A fresh patch is simplest. Merge into an existing one only if you already have a '
      + 'vz-patch.wad you want these to join.'));
    const cards = el('div', 'cards');

    const fresh = el('button', 'card');
    fresh.appendChild(el('div', 'card-icon', '✨'));
    fresh.appendChild(el('div', 'card-t', 'A fresh patch'));
    fresh.appendChild(el('div', 'card-s', 'Just these assets, in a new WAD.'));
    fresh.addEventListener('click', () => { S.doc = WadDoc.empty(); finishPack(P); });
    cards.appendChild(fresh);

    const into = el('label', 'card');
    into.appendChild(el('div', 'card-icon', '⤵'));
    into.appendChild(el('div', 'card-t', 'Into an existing WAD'));
    into.appendChild(el('div', 'card-s', 'Drop a vz-patch.wad; these are appended to it.'));
    const inp = el('input');
    inp.type = 'file'; inp.accept = '.wad'; inp.style.display = 'none';
    into.appendChild(inp);
    into.addEventListener('click', (e) => { if (e.target !== inp) inp.click(); });
    inp.addEventListener('change', async (e) => {
      if (!e.target.files[0]) return;
      try {
        S.doc = WadDoc.fromBytes(await readFileBytes(e.target.files[0]));
        S.name = e.target.files[0].name;
        finishPack(P, true);
      } catch (err) {
        flashInto(body, verdict({ ok: false, title: 'Not a WAD', lines: [{ k: 'reason', v: err.message, ok: false }] }));
      }
    });
    cards.appendChild(into);
    body.appendChild(cards);
  });

  rail.draw();
}

function finishPack(P, merged = false) {
  const warnings = [];
  for (const { asset, block } of assetsToBlocks(P.parsed.assets)) {
    if (S.doc.assetIndex().has(asset.hash >>> 0)) {
      warnings.push(`${asset.name} (${hex8(asset.hash)}) already exists in that WAD — it will be shadowed by load order.`);
    }
    S.doc.addBlock(block);
  }
  if (!merged) S.name = `${P.name || 'my_skin'}-patch.wad`;
  renderManager();
  const model = P.parsed.assets.find((a) => a.typeId === 19);
  flash(verdict({
    ok: true,
    title: `Packed ${P.parsed.assets.length} asset${P.parsed.assets.length === 1 ? '' : 's'}`,
    lines: [
      { k: 'blocks now', v: String(S.doc.blocks.length) },
      ...(warnings.length ? [{ k: 'collisions', v: String(warnings.length), ok: false }] : []),
    ],
    hint: (warnings.length ? warnings.join(' ') + '  ' : '')
      + 'Press Save WAD, then drop it in your game as data\\vz-patch.wad (back up any '
      + 'existing patch first)'
      + (model ? `. Wear it in game with:  Player.SetOutfit(Player.GetLocalCharacter(), "${model.name}")` : '.'),
  }));
}

function flashInto(el2, node) { el2.appendChild(node); }

// The offline single-file build may inline the sample as base64; the dev/hosted build fetches
// it. Try the global first so file:// works when it is present.
async function fetchSample() {
  if (typeof window !== 'undefined' && window.__WADSIM_SAMPLE_B64__) {
    const bin = atob(window.__WADSIM_SAMPLE_B64__);
    const b = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) b[i] = bin.charCodeAt(i);
    return b;
  }
  const res = await fetch('samples/demo-texture-assets.zip');
  if (!res.ok) throw new Error(`sample fetch failed (${res.status})`);
  return new Uint8Array(await res.arrayBuffer());
}
